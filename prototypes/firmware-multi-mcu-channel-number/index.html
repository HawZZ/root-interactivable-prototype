<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>固件多 MCU 通道号 + 虚拟版本 - 可交互原型</title>
<style>
:root{
  --el-color-primary:#4372ff;--el-color-primary-light-9:#ecf5ff;--el-color-primary-light-7:#e0ecff;
  --el-color-success:#67c23a;--el-color-warning:#e6a23c;--el-color-danger:#f56c6c;--el-color-info:#909399;
  --app-aside-bg-color:#001529;--app-bg-color:#f9f9f9;--el-bg-color:#ffffff;
  --el-text-color-primary:#303133;--el-text-color-regular:#606266;--el-text-color-secondary:#909399;--el-text-color-placeholder:#a8abb2;
  --el-border-color:#dcdfe6;--el-border-color-light:#e4e7ed;--el-border-color-lighter:#ebeef5;
  --gap-8:8px;--gap-12:12px;--gap-16:16px;--gap-24:24px;--radius:4px;
  --aside-width:208px;--header-height:54px;--annotation-width:380px;
  --sans:"PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;min-height:100%;background:var(--app-bg-color);color:var(--el-text-color-primary);font-family:var(--sans);font-size:14px;line-height:1.5;}
button,input,select,textarea{font:inherit;cursor:pointer;}
.shell{display:grid;grid-template-columns:minmax(0,1fr) var(--annotation-width);min-height:100vh;}
.prototype-pane{background:var(--app-bg-color);overflow:auto;}
.annotation-pane{background:var(--el-bg-color);border-left:1px solid var(--el-border-color);overflow:auto;position:sticky;top:0;max-height:100vh;}
.app{min-height:100vh;display:grid;grid-template-columns:var(--aside-width) minmax(0,1fr);}
.aside{background:var(--app-aside-bg-color);color:rgba(255,255,255,.78);min-height:100vh;position:sticky;top:0;align-self:start;display:flex;flex-direction:column;}
.aside-logo{padding:0 16px;height:var(--header-height);display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.08);}
.aside-logo span{font-size:16px;font-weight:600;color:#fff;}
.aside-menu{flex:1;padding:8px 0;}
.aside-menu-item{padding:0 20px;height:50px;display:flex;align-items:center;gap:10px;font-size:14px;color:rgba(255,255,255,.75);cursor:pointer;border-radius:0;}
.aside-menu-item:hover{background:rgba(255,255,255,.06);}
.aside-menu-item.active{background:var(--el-color-primary);color:#fff;}
.aside-menu-group{padding:8px 20px 4px;font-size:12px;color:rgba(255,255,255,.35);font-weight:600;}
.main-area{display:flex;flex-direction:column;min-width:0;}
.nav-header{height:var(--header-height);background:var(--el-bg-color);border-bottom:1px solid var(--el-border-color-light);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:10;}
.breadcrumb{font-size:12px;line-height:22px;color:var(--el-text-color-regular);display:flex;gap:4px;align-items:center;}
.breadcrumb .sep{color:var(--el-text-color-placeholder);}
.breadcrumb .current{color:var(--el-text-color-primary);font-weight:500;}
.page-container{padding:var(--gap-24);min-width:0;}
.screen{width:1440px;margin:0 auto;}
.page-tabs{display:flex;gap:0;border-bottom:2px solid var(--el-border-color-light);margin-bottom:var(--gap-16);}
.page-tab{padding:8px 20px;font-size:14px;font-weight:500;color:var(--el-text-color-regular);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;}
.page-tab.active{color:var(--el-color-primary);border-bottom-color:var(--el-color-primary);}
.filter-bar{display:flex;gap:var(--gap-12);align-items:center;margin-bottom:var(--gap-16);flex-wrap:wrap;}
.filter-item{display:flex;align-items:center;gap:6px;}
.filter-label{font-size:14px;color:var(--el-text-color-regular);white-space:nowrap;}
.filter-input,.filter-select{height:32px;width:200px;border:1px solid var(--el-border-color);border-radius:var(--radius);padding:0 10px;font-size:14px;background:var(--el-bg-color);color:var(--el-text-color-primary);}
.btn{height:32px;padding:0 16px;border:1px solid var(--el-border-color);border-radius:var(--radius);background:var(--el-bg-color);color:var(--el-text-color-regular);font-size:14px;display:inline-flex;align-items:center;gap:4px;}
.btn-primary{background:var(--el-color-primary);border-color:var(--el-color-primary);color:#fff;}
.btn-primary:hover{background:#2b6bd9;}
.btn-text{border:none;background:none;color:var(--el-color-primary);padding:0 4px;height:auto;font-size:14px;}
.btn-text.danger{color:var(--el-color-danger);}
.btn-text.warning{color:var(--el-color-warning);}
.data-table{width:100%;border-collapse:collapse;background:var(--el-bg-color);border:1px solid var(--el-border-color-light);border-radius:var(--radius);overflow:hidden;}
.data-table th{background:#fafafa;color:var(--el-text-color-secondary);font-size:14px;font-weight:600;padding:10px 12px;text-align:left;border-bottom:1px solid var(--el-border-color-lighter);white-space:nowrap;}
.data-table td{color:var(--el-text-color-regular);font-size:14px;padding:10px 12px;border-bottom:1px solid var(--el-border-color-lighter);}
.data-table tr:hover td{background:#f5f7fa;}
.tag{display:inline-flex;align-items:center;height:24px;padding:0 8px;border-radius:var(--radius);font-size:12px;font-weight:400;}
.tag-success{background:#f0f9eb;color:var(--el-color-success);border:1px solid #e1f3d8;}
.tag-warning{background:#fdf6ec;color:var(--el-color-warning);border:1px solid #faecd8;}
.tag-danger{background:#fef0f0;color:var(--el-color-danger);border:1px solid #fde2e2;}
.tag-info{background:#f4f4f5;color:var(--el-color-info);border:1px solid #e9e9eb;}
.channel-null{color:var(--el-text-color-placeholder);}
.channel-value{color:var(--el-text-color-primary);font-weight:500;}
.pagination{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-top:var(--gap-16);font-size:14px;color:var(--el-text-color-regular);}
.pagination select{height:32px;border:1px solid var(--el-border-color);border-radius:var(--radius);padding:0 8px;}
.form-page{background:var(--el-bg-color);border:1px solid var(--el-border-color-light);border-radius:var(--radius);padding:var(--gap-24);}
.form-page-title{font-size:16px;font-weight:500;margin:0 0 var(--gap-24);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap-16) var(--gap-24);}
.form-field{display:flex;flex-direction:column;gap:6px;}
.form-field.full{grid-column:1/-1;}
.form-field label{font-size:14px;color:var(--el-text-color-regular);font-weight:500;}
.form-field label .required{color:var(--el-color-danger);}
.form-input,.form-select,.form-textarea{height:32px;border:1px solid var(--el-border-color);border-radius:var(--radius);padding:0 10px;font-size:14px;color:var(--el-text-color-primary);background:var(--el-bg-color);}
.form-input:read-only{background:#f5f7fa;color:var(--el-text-color-placeholder);}
.form-textarea{height:52px;padding:5px 11px;resize:vertical;}
.form-help{font-size:12px;color:var(--el-text-color-secondary);}
.form-error{font-size:12px;color:var(--el-color-danger);display:none;}
.form-error.show{display:block;}
.form-footer{display:flex;justify-content:flex-end;gap:var(--gap-12);margin-top:var(--gap-24);padding-top:var(--gap-16);border-top:1px solid var(--el-border-color-lighter);}
.upload-area{border:1px dashed var(--el-border-color);border-radius:var(--radius);padding:20px;text-align:center;color:var(--el-text-color-secondary);font-size:14px;cursor:pointer;}
.upload-area:hover{border-color:var(--el-color-primary);color:var(--el-color-primary);}
.pane-header{position:sticky;top:0;z-index:2;padding:16px;background:var(--el-bg-color);border-bottom:1px solid var(--el-border-color-light);}
.pane-title{margin:0;font-size:14px;font-weight:700;}
.pane-subtitle{font-size:12px;color:var(--el-text-color-secondary);margin-top:4px;}
.doc{padding:16px;}
.note-stack{display:grid;gap:10px;}
.note-card{display:grid;grid-template-columns:28px 1fr;gap:10px;padding:12px;border:1px solid var(--el-border-color-light);border-radius:8px;background:var(--el-bg-color);}
.note-card.highlight{border-color:var(--el-color-primary);background:var(--el-color-primary-light-9);}
.note-number,.note-anchor{display:inline-grid;width:22px;height:22px;place-items:center;border-radius:999px;background:#facc15;color:#713f12;font-size:12px;font-weight:700;flex-shrink:0;}
.note-anchor{position:absolute;}
.note-title{margin:0 0 4px;font-size:13px;font-weight:700;}
.note-body{font-size:13px;color:var(--el-text-color-regular);line-height:1.6;}
.note-body ul{margin:4px 0 0;padding-left:16px;}
.note-body li{margin-bottom:2px;}
.note-body .field{font-size:12px;color:var(--el-text-color-secondary);margin-top:4px;}
.note-body .label{color:var(--el-text-color-primary);font-weight:500;}
.anchor-wrapper{position:relative;}
.anchor-wrapper .note-anchor{position:absolute;top:-10px;right:-10px;z-index:5;}
.sub-tabs{display:flex;gap:0;border-bottom:1px solid var(--el-border-color-light);margin-bottom:var(--gap-16);}
.sub-tab{padding:6px 16px;font-size:13px;color:var(--el-text-color-regular);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;}
.sub-tab.active{color:var(--el-color-primary);border-bottom-color:var(--el-color-primary);}
.detail-header{display:flex;align-items:center;gap:var(--gap-12);margin-bottom:var(--gap-16);}
.detail-header .product-name{font-size:16px;font-weight:500;}
.detail-header .product-tag{font-size:12px;}
.info-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--gap-12);margin-bottom:var(--gap-24);}
.info-card{background:var(--el-bg-color);border:1px solid var(--el-border-color-light);border-radius:var(--radius);padding:var(--gap-12);}
.info-card .label{font-size:12px;color:var(--el-text-color-secondary);margin-bottom:4px;}
.info-card .value{font-size:14px;color:var(--el-text-color-primary);font-weight:500;}
.toast{position:fixed;top:20px;right:20px;z-index:100;padding:12px 20px;border-radius:var(--radius);font-size:14px;box-shadow:0 0 12px rgba(0,0,0,.12);display:none;}
.toast.show{display:block;}
.toast-success{background:#f0f9eb;color:var(--el-color-success);border:1px solid #e1f3d8;}
.toast-error{background:#fef0f0;color:var(--el-color-danger);border:1px solid #fde2e2;}
.vv-section{margin-top:var(--gap-24);}
.vv-section-title{font-size:14px;font-weight:500;margin:0 0 var(--gap-12);color:var(--el-text-color-primary);}
.vv-mcu-table{width:100%;border-collapse:collapse;background:#fafbfc;border:1px solid var(--el-border-color-light);border-radius:var(--radius);overflow:hidden;margin-bottom:var(--gap-12);}
.vv-mcu-table th{background:#f0f2f5;color:var(--el-text-color-secondary);font-size:13px;font-weight:600;padding:8px 12px;text-align:left;border-bottom:1px solid var(--el-border-color-lighter);}
.vv-mcu-table td{padding:8px 12px;border-bottom:1px solid var(--el-border-color-lighter);}
.vv-mcu-table input{height:30px;border:1px solid var(--el-border-color);border-radius:var(--radius);padding:0 8px;font-size:13px;width:100%;background:var(--el-bg-color);}
.vv-mcu-table select{height:30px;border:1px solid var(--el-border-color);border-radius:var(--radius);padding:0 8px;font-size:13px;width:100%;background:var(--el-bg-color);}
.vv-mcu-table tr.vv-row-conflict td{background:#fef0f0 !important;}
.vv-constraint-hint{font-size:12px;color:var(--el-text-color-secondary);margin-top:8px;line-height:1.6;}
.vv-display{font-size:13px;color:var(--el-text-color-regular);padding:0 4px;}
.vv-display.muted{color:var(--el-text-color-placeholder);}
.vv-add-row{display:flex;justify-content:center;margin-bottom:var(--gap-16);}
@media(max-width:900px){.shell{grid-template-columns:1fr;}.annotation-pane{max-height:40vh;border-left:none;border-top:1px solid var(--el-border-color);}.screen{width:100%;}}
</style>
</head>
<body>
<div class="shell">
  <main class="prototype-pane" aria-label="交互式 Web 原型">
    <div class="app">
      <aside class="aside">
        <div class="aside-logo"><span>IoT Admin</span></div>
        <nav class="aside-menu">
          <div class="aside-menu-group">设备管理</div>
          <div class="aside-menu-item" data-page="firmware-list">固件管理</div>
          <div class="aside-menu-item" data-page="create-firmware" style="padding-left:36px;">└ 创建固件</div>
          <div class="aside-menu-item" data-page="virtual-version-list" style="padding-left:36px;">└ 虚拟版本配置</div>
          <div class="aside-menu-item" data-page="ota-list">OTA</div>
          <div class="aside-menu-group">智能产品</div>
          <div class="aside-menu-item" data-page="test-firmware">产品详情 > 设备调试</div>
        </nav>
      </aside>
      <div class="main-area">
        <header class="nav-header">
          <div class="breadcrumb" id="breadcrumb"></div>
        </header>
        <div class="page-container">
          <div class="screen" id="screen"></div>
        </div>
      </div>
    </div>
  </main>
  <aside class="annotation-pane" aria-label="原型批注">
    <div class="pane-header">
      <h2 class="pane-title">原型批注</h2>
      <div class="pane-subtitle" id="pane-subtitle"></div>
    </div>
    <article class="doc" id="doc"></article>
  </aside>
</div>
<div class="toast" id="toast"></div>
<script>
// --- Page definitions ---
const pages = {
  'firmware-list': {
    title: '固件管理', breadcrumb: ['设备管理','固件管理'],
    render: renderFirmwareList, notes: firmwareListNotes
  },
  'create-firmware': {
    title: '创建固件', breadcrumb: ['设备管理','固件管理','创建固件'],
    render: renderCreateFirmware, notes: createFirmwareNotes
  },
  'virtual-version-list': {
    title: '虚拟版本配置', breadcrumb: ['设备管理','固件管理','虚拟版本配置'],
    render: renderVirtualVersionList, notes: virtualVersionListNotes
  },
  'virtual-version-add': {
    title: '新建虚拟版本', breadcrumb: ['设备管理','固件管理','虚拟版本配置','新建虚拟版本'],
    render: renderVirtualVersionAdd, notes: virtualVersionAddNotes
  },
  'ota-list': {
    title: 'OTA 任务列表', breadcrumb: ['设备管理','OTA'],
    render: renderOtaList, notes: otaListNotes
  },
  'test-firmware': {
    title: '设备调试 > 测试固件', breadcrumb: ['智能产品','产品详情','设备调试'],
    render: renderTestFirmware, notes: testFirmwareNotes
  }
};
let activePage = 'firmware-list';

// --- Sample data ---
const firmwareData = [
  {name:'W1Lite_MCU1_v1.2',type:'模组固件',pkgCount:1,version:'1.2.0',hw:'V1',fv:'版本1',channel:1,status:'已发布',time:'2026-07-15 10:30',remark:'MCU1 模组固件',fwUri:'https://cdn.iot.example/MCU1_v1.2.bin'},
  {name:'W1Lite_MCU2_v1.0',type:'MCU固件',pkgCount:1,version:'1.0.0',hw:'V1',fv:'版本1',channel:2,status:'已发布',time:'2026-07-15 10:35',remark:'MCU2 MCU固件',fwUri:'https://cdn.iot.example/MCU2_v1.0.bin'},
  {name:'W1Lite_Base_v1.5',type:'模组固件',pkgCount:1,version:'1.5.0',hw:'V1',fv:'版本1',channel:null,status:'已发布',time:'2026-06-20 14:00',remark:'历史固件，无通道'},
 {name:'W1Lite_MCU1_v1.3',type:'模组固件',pkgCount:1,version:'1.3.0',hw:'V1',fv:'版本1',channel:1,status:'待发布',time:'2026-07-21 09:00',remark:'MCU1 升级版本',fwUri:'https://cdn.iot.example/MCU1_v1.3.bin'},
  {name:'W1Lite_MCU2_v1.1',type:'MCU固件',pkgCount:1,version:'1.1.0',hw:'V2',fv:'版本1',channel:2,status:'待发布',time:'2026-07-22 16:00',remark:'MCU2 V2 硬件版本（用于演示约束）',fwUri:'https://cdn.iot.example/MCU2_v1.1.bin'},
];
const virtualVersionData = [
  {mainVersion:'1.0.0', mcuCount:2, time:'2026-07-20 10:00'},
  {mainVersion:'1.1.0', mcuCount:3, time:'2026-07-22 14:00'},
];
const mcuEntries = [0, 1];
const otaData = [
  {name:'W1Lite MCU1 升级',fwName:'W1Lite_MCU1_v1.2',type:'模组固件',version:'1.2.0',hw:'V1',fv:'版本1',channel:1,status:'进行中',publish:'灰度发布',upgrade:'蓝牙升级',region:'北美',publishTime:'2026-07-16',createTime:'2026-07-15'},
  {name:'W1Lite MCU2 升级',fwName:'W1Lite_MCU2_v1.0',type:'MCU固件',version:'1.0.0',hw:'V1',fv:'版本1',channel:2,status:'已完成',publish:'全量发布',upgrade:'蓝牙升级',region:'亚太',publishTime:'2026-07-16',createTime:'2026-07-15'},
  {name:'W1Lite 基线升级',fwName:'W1Lite_Base_v1.5',type:'模组固件',version:'1.5.0',hw:'V1',fv:'版本1',channel:null,status:'已完成',publish:'全量发布',upgrade:'蓝牙升级',region:'欧洲',publishTime:'2026-06-21',createTime:'2026-06-20'},
];
const testFirmwareData = [
  {name:'W1Lite_MCU1_v1.2',type:'模组固件',version:'1.2.0',hw:'V1',fv:'版本1',channel:1,time:'2026-07-15',log:'MCU1 测试通过'},
  {name:'W1Lite_MCU2_v1.0',type:'MCU固件',version:'1.0.0',hw:'V1',fv:'版本1',channel:2,time:'2026-07-15',log:'MCU2 测试通过'},
  {name:'W1Lite_Base_v1.5',type:'模组固件',version:'1.5.0',hw:'V1',fv:'版本1',channel:null,time:'2026-06-20',log:'基线测试通过'},
];

// --- Render functions ---
function renderFirmwareList(){
  return `
  <div class="page-tabs">
    <button class="page-tab active" onclick="switchPage('firmware-list')">固件列表</button>
    <button class="page-tab" onclick="switchPage('create-firmware')">创建固件</button>
    <button class="page-tab" onclick="switchPage('virtual-version-list')">虚拟版本配置</button>
  </div>
  <div class="anchor-wrapper">
    <span class="note-anchor">1</span>
    <div class="filter-bar">
      <div class="filter-item"><span class="filter-label">固件名称</span><input class="filter-input" placeholder="请输入固件名称"></div>
      <div class="filter-item"><span class="filter-label">固件类型</span><select class="filter-select"><option value="">全部</option><option>模组固件</option><option>MCU固件</option></select></div>
      <div class="filter-item"><span class="filter-label">功能版本</span><select class="filter-select"><option value="">全部</option><option>版本1</option></select></div>
      <button class="btn btn-primary">查询</button>
      <button class="btn">重置</button>
      <button class="btn btn-primary" onclick="switchPage('create-firmware')">创建固件</button>
    </div>
  </div>
  <div class="anchor-wrapper">
    <span class="note-anchor">2</span>
    <table class="data-table">
      <thead><tr>
        <th>固件名称</th><th>固件类型</th><th>固件包数量</th><th>固件版本</th><th>硬件版本</th><th>功能版本</th>
        <th>通道号</th><th>状态</th><th>创建时间</th><th>备注</th><th>操作</th>
      </tr></thead>
      <tbody>
        ${firmwareData.map(f=>`<tr>
          <td>${f.name}</td><td>${f.type}</td><td>${f.pkgCount}</td><td>${f.version}</td><td>${f.hw}</td><td>${f.fv}</td>
          <td>${f.channel!==null?`<span class="channel-value">${f.channel}</span>`:`<span class="channel-null">-</span>`}</td>
          <td><span class="tag ${f.status==='已发布'?'tag-success':'tag-warning'}">${f.status}</span></td>
          <td>${f.time}</td><td>${f.remark}</td>
          <td><button class="btn-text">查看</button><button class="btn-text">编辑</button><button class="btn-text danger">删除</button></td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>
  <div class="pagination">共 ${firmwareData.length} 条 <select><option>10条/页</option></select> <button class="btn">上一页</button><button class="btn">下一页</button></div>
  `;
}

function renderCreateFirmware(){
  return `
  <div class="page-tabs">
    <button class="page-tab" onclick="switchPage('firmware-list')">固件列表</button>
    <button class="page-tab active">创建固件</button>
    <button class="page-tab" onclick="switchPage('virtual-version-list')">虚拟版本配置</button>
  </div>
  <div class="form-page">
    <h3 class="form-page-title">创建固件</h3>
    <div class="form-grid">
      <div class="form-field anchor-wrapper">
        <span class="note-anchor">3</span>
        <label>产品</label>
        <input class="form-input" value="W1 Lite (2079096534792245250)" readonly>
        <span class="form-help">产品在固件列表页已通过产品下拉确定，进入创建页时带入，不可修改。</span>
      </div>

function renderMcuRow(fwIdx,i){
  const fw = (fwIdx!==null && fwIdx!==undefined) ? firmwareData[fwIdx] : null;
  const ch = fw && fw.channel!==null ? fw.channel : null;
  const opts = firmwareData.map((f,idx)=>{
    const label = f.channel!==null ? f.name+'（通道号:'+f.channel+'）' : f.name+'（无通道）';
    return '<option value="'+idx+'"'+(fwIdx===idx?' selected':'')+'>'+label+'</option>';
  }).join('');
  return '<tr class="mcu-row" data-index="'+i+'">'
    + '<td><select class="vv-input-firmware" onchange="onFirmwareSelect(this)"><option value="">请选择固件</option>'+opts+'</select></td>'
    + '<td class="vv-display-type '+(fw?'vv-display':'vv-display muted')+'">'+(fw?fw.type:'-')+'</td>'
    + '<td class="vv-display-targetid '+(ch===null?'vv-display muted':'vv-display')+'">'+(ch!==null?ch:'-')+'</td>'
    + '<td class="vv-display-version '+(fw?'vv-display':'vv-display muted')+'">'+(fw?fw.version:'-')+'</td>'
    + '<td class="vv-display-hw '+(fw?'vv-display':'vv-display muted')+'">'+(fw?fw.hw:'-')+'</td>'
    + '<td class="vv-display-fwuri '+(fw&&fw.fwUri?'vv-display':'vv-display muted')+'">'+(fw&&fw.fwUri?fw.fwUri:'-')+'</td>'
    + '<td><button class="btn-text danger" onclick="removeMcuRow(this)">删除</button></td>'
    + '</tr>';
}

function onFirmwareSelect(sel){
  const row = sel.closest('tr');
  const idx = sel.value;
  const fw = idx!=='' ? firmwareData[parseInt(idx)] : null;
  const ch = fw && fw.channel!==null ? fw.channel : null;
  const typeEl = row.querySelector('.vv-display-type');
  const tidEl = row.querySelector('.vv-display-targetid');
  const verEl = row.querySelector('.vv-display-version');
  const hwEl = row.querySelector('.vv-display-hw');
  const uriEl = row.querySelector('.vv-display-fwuri');
  if(fw){
    typeEl.textContent = fw.type;
    typeEl.className = 'vv-display-type vv-display';
    tidEl.textContent = ch!==null ? ch : '-';
    tidEl.className = 'vv-display-targetid '+(ch===null?'vv-display muted':'vv-display');
    verEl.textContent = fw.version;
    verEl.className = 'vv-display-version vv-display';
    hwEl.textContent = fw.hw;
    hwEl.className = 'vv-display-hw vv-display';
    uriEl.textContent = fw.fwUri || '-';
    uriEl.className = 'vv-display-fwuri '+(fw.fwUri?'vv-display':'vv-display muted');
  } else {
    typeEl.textContent = '-'; typeEl.className = 'vv-display-type vv-display muted';
    tidEl.textContent = '-'; tidEl.className = 'vv-display-targetid vv-display muted';
    verEl.textContent = '-'; verEl.className = 'vv-display-version vv-display muted';
    hwEl.textContent = '-'; hwEl.className = 'vv-display-hw vv-display muted';
    uriEl.textContent = '-'; uriEl.className = 'vv-display-fwuri vv-display muted';
  }
  checkMcuConstraints();
}

function checkMcuConstraints(){
  const tbody = document.getElementById('vv-mcu-body');
  if(!tbody) return;
  const rows = tbody.querySelectorAll('tr');
  const selected = [];
  rows.forEach(r=>{
    r.classList.remove('vv-row-conflict');
    const sel = r.querySelector('.vv-input-firmware');
    if(sel && sel.value!=='') selected.push({row:r, fw:firmwareData[parseInt(sel.value)]});
  });
  if(selected.length===0) return;
  // detect duplicate (type + channel)
  const seen = {};
  const dupRows = new Set();
  selected.forEach(s=>{
    const key = s.fw.type+'|'+(s.fw.channel!==null?s.fw.channel:'null');
    if(seen[key]){ dupRows.add(s.row); dupRows.add(seen[key]); }
    seen[key] = s.row;
  });
  // detect hardware version mismatch
  const hwSet = new Set(selected.map(s=>s.fw.hw));
  if(hwSet.size > 1) selected.forEach(s=>dupRows.add(s.row));
  dupRows.forEach(r=>r.classList.add('vv-row-conflict'));
}

function addMcuRow(){
  const tbody = document.getElementById('vv-mcu-body');
  if(!tbody) return;
  const i = tbody.querySelectorAll('tr').length;
  tbody.insertAdjacentHTML('beforeend', renderMcuRow(null,i));
}

function removeMcuRow(btn){
  const row = btn.closest('tr');
  const tbody = document.getElementById('vv-mcu-body');
  if(!tbody || tbody.querySelectorAll('tr').length <= 1){
    showToast('error','至少保留 1 行固件条目');
    return;
  }
  row.remove();
}

function saveVirtualVersion(){
  const mainVer = document.getElementById('vv-main-version');
  if(!mainVer || !mainVer.value.trim()){
    showToast('error','请填写虚拟版本号');
    return;
  }
  const tbody = document.getElementById('vv-mcu-body');
  if(!tbody) return;
  const rows = tbody.querySelectorAll('tr');
  for(const r of rows){
    const sel = r.querySelector('.vv-input-firmware');
    if(!sel || !sel.value){
      showToast('error','请为每行选择一个固件');
      return;
    }
  }
  // collect selected firmware
  const selected = [];
  rows.forEach(r=>{
    const sel = r.querySelector('.vv-input-firmware');
    if(sel && sel.value!=='') selected.push(firmwareData[parseInt(sel.value)]);
  });
  // type + channel uniqueness
  const seen = {};
  for(const fw of selected){
    const key = fw.type+'|'+(fw.channel!==null?fw.channel:'null');
    if(seen[key]){
      showToast('error','固件类型与通道号组合必须唯一：'+fw.type+'（通道号 '+(fw.channel!==null?fw.channel:'无')+'）重复');
      return;
    }
    seen[key] = true;
  }
  // hardware version consistency
  const hwSet = new Set(selected.map(f=>f.hw));
  if(hwSet.size > 1){
    showToast('error','所有关联固件的硬件版本必须一致，当前存在：'+[...hwSet].join('、'));
    return;
  }
  showToast('success','虚拟版本保存成功');
  setTimeout(()=>switchPage('virtual-version-list'),800);
}

// --- Navigation ---
function switchPage(pageId){
  activePage = pageId;
  render();
}
document.querySelector('.aside').addEventListener('click',e=>{
  const item = e.target.closest('[data-page]');
  if(item) switchPage(item.dataset.page);
});

// --- Interactions ---
function simulateUpload(){
  const placeholder = document.getElementById('upload-placeholder');
  const fileDiv = document.getElementById('upload-file');
  const filename = document.getElementById('upload-filename');
  if(placeholder && fileDiv){
    placeholder.style.display='none';
    fileDiv.style.display='block';
    filename.textContent='Lute_M9_3.08_10_aabb_20240401.ufw';
    const nameEl = document.getElementById('fw-name');
    const verEl = document.getElementById('fw-version');
    const hwEl = document.getElementById('fw-hw');
    if(nameEl) nameEl.value = 'Lute_M9_3.08_10_aabb_20240401';
    if(verEl) verEl.value = '3.08';
    if(hwEl) hwEl.value = '10';
    showToast('success','固件文件已上传，固件名称、版本、硬件版本已自动解析');
  }
}
function validateChannel(){
  const input = document.getElementById('channel-input');
  const error = document.getElementById('channel-error');
  const val = input.value.trim();
  if(val === ''){ error.classList.remove('show'); return true; }
  const num = parseInt(val,10);
  if(isNaN(num) || num <= 0 || !/^\d+$/.test(val)){
    error.classList.add('show');
    return false;
  }
  error.classList.remove('show');
  return true;
}
function saveFirmware(){
  if(!validateChannel()) return;
  const conflict = document.getElementById('conflict-error');
  conflict.classList.add('show');
  showToast('error','冲突校验：同一产品下已存在固件类型、硬件版本、固件版本、通道号完全一致的固件记录');
}
function showToast(type,msg){
  const toast = document.getElementById('toast');
  toast.className = `toast toast-${type} show`;
  toast.textContent = msg;
  setTimeout(()=>toast.classList.remove('show'),3000);
}

// --- Main render ---
function render(){
  const p = pages[activePage];
  document.getElementById('breadcrumb').innerHTML =
    p.breadcrumb.map((b,i)=> i===p.breadcrumb.length-1
      ? `<span class="current">${b}</span>`
      : `<span>${b}</span><span class="sep">/</span>`
    ).join('');
  document.getElementById('screen').innerHTML = p.render();
  const notesData = p.notes();
  document.getElementById('pane-subtitle').textContent = notesData.subtitle;
  document.getElementById('doc').innerHTML =
    `<div class="note-stack">${notesData.notes.map(n=>`
      <section class="note-card ${n.highlight?'highlight':''}">
        <span class="note-number">${n.n}</span>
        <div>
          <h3 class="note-title">${n.t}</h3>
          <div class="note-body"><ul>${n.lines.map(l=>`<li>${l}</li>`).join('')}</ul></div>
        </div>
      </section>`).join('')}
    </div>`;
}
render();
</script>
