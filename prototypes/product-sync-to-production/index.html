<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IoT Admin 产品同步到生产环境原型</title>
<style>
:root {
  --app-aside-bg-color: #001529;
  --app-aside-bg-active: #0b2a4a;
  --app-bg-color: #f9f9f9;
  --el-bg-color: #ffffff;
  --el-color-primary: #4372ff;
  --el-color-primary-light-9: #ecf5ff;
  --el-color-success: #67c23a;
  --el-color-success-light: #f0f9eb;
  --el-color-warning: #e6a23c;
  --el-color-warning-light: #fdf6ec;
  --el-color-danger: #f56c6c;
  --el-color-danger-light: #fef0f0;
  --el-color-info: #909399;
  --el-text-color-primary: #303133;
  --el-text-color-regular: #606266;
  --el-text-color-secondary: #909399;
  --el-text-color-placeholder: #a8abb2;
  --el-border-color: #dcdfe6;
  --el-border-color-light: #e4e7ed;
  --el-border-color-lighter: #ebeef5;
  --table-head-bg: #fafafa;
  --radius: 4px;
  --aside-width: 208px;
  --header-height: 54px;
  --annotation-width: 360px;
  --sans: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  --annotation-accent: #f5b400;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:var(--app-bg-color);color:var(--el-text-color-primary);font-family:var(--sans);font-size:14px;line-height:1.5;overflow-x:hidden}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
a{color:var(--el-color-primary);text-decoration:none}

.prototype-shell{display:grid;grid-template-columns:minmax(0,1fr) var(--annotation-width);min-height:100vh}
.prototype-left{min-width:0;overflow-x:auto;background:var(--app-bg-color)}
.prototype-right{background:var(--el-bg-color);border-left:1px solid var(--el-border-color-light);overflow-y:auto;position:sticky;top:0;height:100vh}

.app{min-height:100vh;display:grid;grid-template-columns:var(--aside-width) minmax(0,1fr);min-width:1240px}
.aside{background:var(--app-aside-bg-color);color:rgba(255,255,255,.78);min-height:100vh;position:sticky;top:0;align-self:start;display:flex;flex-direction:column}
.brand{height:54px;display:flex;align-items:center;gap:10px;padding:0 16px;border-bottom:1px solid rgba(255,255,255,.08);color:#fff;font-weight:700}
.brand-mark{width:30px;height:30px;border-radius:var(--radius);background:#85b436;display:grid;place-items:center;color:#fff;font-size:13px;font-weight:800}
.brand-subtitle{color:rgba(255,255,255,.52);font-size:12px;white-space:nowrap}
.menu{padding:8px 0 24px;overflow:auto;flex:1}
.menu-group-title,.menu-item{display:flex;align-items:center;gap:10px;padding:0 18px;white-space:nowrap}
.menu-group-title{height:36px;margin-top:8px;color:rgba(255,255,255,.38);font-size:12px}
.menu-item{height:42px;border-left:3px solid transparent;color:rgba(255,255,255,.76)}
.menu-item.active{background:var(--app-aside-bg-active);border-left-color:var(--el-color-primary);color:#fff}
.menu-dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.72;flex:0 0 auto}

.shell-area{min-width:0;display:grid;grid-template-rows:var(--header-height) minmax(0,1fr)}
.header{height:var(--header-height);background:var(--el-bg-color);box-shadow:rgba(0,0,0,.06) 0 -1px 0 0 inset;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:0 24px;position:sticky;top:0;z-index:20}
.breadcrumb{color:var(--el-text-color-secondary);font-size:12px;display:flex;gap:6px;align-items:center;min-width:0}
.breadcrumb strong{color:var(--el-text-color-primary);font-weight:500}
.userbar{display:flex;align-items:center;gap:12px;color:var(--el-text-color-regular);font-size:13px;white-space:nowrap}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--el-color-primary-light-9);color:var(--el-color-primary);display:grid;place-items:center;font-weight:700;font-size:12px}

.content{padding:16px 24px;min-width:0}

.scenario-bar{background:var(--el-color-warning-light);border:1px solid var(--el-color-warning);border-radius:var(--radius);padding:8px 16px;margin-bottom:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.scenario-bar .label{font-size:12px;color:var(--el-text-color-regular);font-weight:500;white-space:nowrap}
.scenario-btn{height:28px;padding:0 12px;border:1px solid var(--el-border-color);border-radius:var(--radius);background:#fff;color:var(--el-text-color-regular);font-size:12px}
.scenario-btn.active{background:var(--el-color-warning);border-color:var(--el-color-warning);color:#fff}
.scenario-btn:hover{border-color:var(--el-color-primary)}
.scenario-btn.active:hover{border-color:var(--el-color-warning)}

.product-summary{background:var(--el-bg-color);border:1px solid var(--el-border-color-light);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px}
.product-title-row{display:flex;align-items:center;justify-content:space-between;gap:12px;min-width:0;margin-bottom:14px}
.product-name-line{display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-width:0}
.product-name{font-size:18px;font-weight:600;margin:0}
.product-cloud{color:var(--el-text-color-secondary);font-size:13px;white-space:nowrap}
.product-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.meta-grid{display:grid;grid-template-columns:repeat(6,minmax(100px,1fr));gap:12px 20px}
.meta-item{min-width:0}
.meta-label{color:var(--el-text-color-secondary);font-size:12px;margin-bottom:4px}
.meta-value{color:var(--el-text-color-regular);overflow:hidden;text-overflow:ellipsis}

.tag{display:inline-flex;align-items:center;height:24px;padding:0 8px;border-radius:var(--radius);font-size:12px;font-weight:500;white-space:nowrap}
.tag-success{background:var(--el-color-success-light);color:var(--el-color-success);border:1px solid var(--el-color-success)}
.tag-warning{background:var(--el-color-warning-light);color:var(--el-color-warning);border:1px solid var(--el-color-warning)}
.tag-danger{background:var(--el-color-danger-light);color:var(--el-color-danger);border:1px solid var(--el-color-danger)}
.tag-info{background:var(--el-color-primary-light-9);color:var(--el-color-primary);border:1px solid var(--el-color-primary)}
.tag-gray{background:#f4f4f5;color:var(--el-color-info);border:1px solid var(--el-border-color-light)}

.tabs{background:var(--el-bg-color);border:1px solid var(--el-border-color-light);border-radius:var(--radius) var(--radius) 0 0;display:flex;padding:0 20px;min-height:44px;align-items:flex-end;overflow-x:auto}
.tab{height:42px;padding:0 16px;border:0;border-bottom:2px solid transparent;background:transparent;color:var(--el-text-color-regular);white-space:nowrap;font-weight:500;font-size:14px}
.tab.active{color:var(--el-color-primary);border-bottom-color:var(--el-color-primary)}

.panel{background:var(--el-bg-color);border:1px solid var(--el-border-color-light);border-top:0;border-radius:0 0 var(--radius) var(--radius);min-height:460px}
.panel-header{height:56px;padding:0 20px;border-bottom:1px solid var(--el-border-color-lighter);display:flex;align-items:center;justify-content:space-between;gap:16px}
.panel-title{font-size:16px;font-weight:600;margin:0}
.panel-main{padding:16px 20px 24px}

.btn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 14px;border:1px solid var(--el-border-color);border-radius:var(--radius);background:#fff;color:var(--el-text-color-regular);font-size:14px;font-weight:500;white-space:nowrap}
.btn:hover{border-color:var(--el-color-primary);color:var(--el-color-primary)}
.btn-primary{background:var(--el-color-primary);border-color:var(--el-color-primary);color:#fff}
.btn-primary:hover{background:var(--el-color-primary);color:#fff;opacity:.9}
.btn-danger{background:var(--el-color-danger);border-color:var(--el-color-danger);color:#fff}
.btn-danger:hover{opacity:.9}
.btn-danger:disabled{background:#fab6b6;border-color:#fab6b6;color:#fff;cursor:not-allowed;opacity:1}
.btn-sm{height:28px;padding:0 10px;font-size:12px}
.btn:disabled{background:#f5f7fa;border-color:#e4e7ed;color:#c0c4cc;cursor:not-allowed}

.form-row{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin-bottom:18px}
.form-item{display:grid;gap:6px}
.form-item label{font-size:13px;font-weight:500;color:var(--el-text-color-regular)}
.form-item .val{min-height:32px;padding:6px 11px;border:1px solid var(--el-border-color);border-radius:var(--radius);background:#f9f9f9;color:var(--el-text-color-regular);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.form-item .val.readonly{background:#f5f7fa;color:var(--el-text-color-secondary)}

.kv-table{width:100%;border-collapse:collapse;font-size:13px}
.kv-table th,.kv-table td{border:1px solid var(--el-border-color-lighter);padding:8px 12px;text-align:left}
.kv-table th{background:var(--table-head-bg);color:var(--el-text-color-secondary);font-weight:600;width:140px}
.kv-table td{color:var(--el-text-color-regular)}

.modal-scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center}
.modal-scrim.open{display:flex}
.modal{background:#fff;border-radius:8px;box-shadow:0 12px 48px rgba(0,0,0,.2);max-width:560px;width:90%;max-height:85vh;display:flex;flex-direction:column}
.modal.wide{max-width:680px}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--el-border-color-lighter);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:600;margin:0}
.modal-close{width:28px;height:28px;border:0;background:transparent;font-size:18px;color:var(--el-text-color-secondary);display:grid;place-items:center;border-radius:var(--radius)}
.modal-close:hover{background:#f5f7fa}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 20px;border-top:1px solid var(--el-border-color-lighter);display:flex;justify-content:flex-end;gap:8px}

.spinner{width:32px;height:32px;border:3px solid var(--el-border-color-lighter);border-top-color:var(--el-color-primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{text-align:center;color:var(--el-text-color-secondary);margin-top:12px}

.progress-list{display:grid;gap:0}
.progress-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--el-border-color-lighter)}
.progress-item:last-child{border-bottom:0}
.progress-icon{width:20px;height:20px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;font-size:12px}
.progress-icon.pending{background:#f4f4f5;color:var(--el-text-color-secondary)}
.progress-icon.syncing{background:var(--el-color-primary-light-9);color:var(--el-color-primary)}
.progress-icon.success{background:var(--el-color-success-light);color:var(--el-color-success)}
.progress-icon.failure{background:var(--el-color-danger-light);color:var(--el-color-danger)}
.progress-icon.syncing::before{content:"";width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;display:block}
.progress-name{font-size:14px;color:var(--el-text-color-regular);flex:1}
.progress-status{font-size:12px;color:var(--el-text-color-secondary)}
.progress-error{font-size:12px;color:var(--el-color-danger);margin-left:8px}

.diff-table{width:100%;border-collapse:collapse;font-size:13px}
.diff-table th,.diff-table td{border:1px solid var(--el-border-color-lighter);padding:8px 12px;text-align:left}
.diff-table th{background:var(--table-head-bg);color:var(--el-text-color-secondary);font-weight:600}
.diff-table .arrow{color:var(--el-text-color-secondary);text-align:center;width:30px}
.diff-table .from{color:var(--el-color-warning)}
.diff-table .to{color:var(--el-color-primary)}

.impact-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:16px 0}
.impact-card{border:1px solid var(--el-border-color-light);border-radius:var(--radius);padding:12px 16px;background:#fafafa}
.impact-card .num{font-size:24px;font-weight:700;color:var(--el-text-color-primary);line-height:1.2}
.impact-card .num.danger{color:var(--el-color-danger)}
.impact-card .lbl{font-size:12px;color:var(--el-text-color-secondary);margin-top:4px}

.warning-box{background:var(--el-color-warning-light);border:1px solid var(--el-color-warning);border-radius:var(--radius);padding:12px 16px;margin:16px 0;font-size:13px;color:var(--el-text-color-regular);display:flex;gap:8px;align-items:flex-start}
.warning-box .icon{flex:0 0 auto;font-size:16px}
.danger-box{background:var(--el-color-danger-light);border:1px solid var(--el-color-danger);border-radius:var(--radius);padding:12px 16px;margin:16px 0;font-size:13px;color:var(--el-color-danger);display:flex;gap:8px;align-items:flex-start}
.danger-box .icon{flex:0 0 auto;font-size:16px}
.info-box{background:var(--el-color-primary-light-9);border:1px solid var(--el-color-primary);border-radius:var(--radius);padding:12px 16px;margin:16px 0;font-size:13px;color:var(--el-color-primary)}

.checkbox-row{display:flex;align-items:center;gap:8px;margin:16px 0;cursor:pointer}
.checkbox-row input{width:16px;height:16px;accent-color:var(--el-color-primary)}
.checkbox-row span{font-size:14px;color:var(--el-text-color-regular)}

.range-list{margin:12px 0;padding:0;list-style:none}
.range-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;color:var(--el-text-color-regular)}
.range-item .dot{width:6px;height:6px;border-radius:50%;background:var(--el-color-primary);flex:0 0 auto}
.excl-list{margin:8px 0;padding:0;list-style:none}
.excl-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;color:var(--el-text-color-secondary)}
.excl-item .dot{width:6px;height:6px;border-radius:50%;background:var(--el-color-info);flex:0 0 auto}

.result-icon{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;margin:0 auto 16px}
.result-icon.success{background:var(--el-color-success-light);color:var(--el-color-success);font-size:28px}
.result-icon.failure{background:var(--el-color-danger-light);color:var(--el-color-danger);font-size:28px}
.result-text{text-align:center;font-size:15px;font-weight:600;color:var(--el-text-color-primary);margin-bottom:8px}
.result-sub{text-align:center;font-size:13px;color:var(--el-text-color-secondary);margin-bottom:16px}

.anno-header{padding:16px;position:sticky;top:0;z-index:2;background:var(--el-bg-color);border-bottom:1px solid var(--el-border-color-light)}
.anno-title{margin:0;font-size:14px;font-weight:700}
.anno-caption{font-size:12px;color:var(--el-text-color-secondary);margin-top:6px;line-height:1.6}
.anno-list{padding:12px;overflow-y:auto}
.anno-scenario{margin:0;padding:8px 16px;border-radius:0;border-left:0;border-right:0;border-top:0}
.anno-card{margin-bottom:12px;padding:14px;background:#fff;border:1px solid var(--el-border-color-light);border-radius:var(--radius)}
.anno-number{display:inline-grid;width:22px;height:22px;place-items:center;border-radius:50%;background:var(--annotation-accent);color:#5a3e00;font-size:12px;font-weight:700;margin-right:8px;flex:0 0 auto}
.anno-card-title{display:flex;align-items:center;font-size:13px;font-weight:600;margin-bottom:8px;color:var(--el-text-color-primary)}
.anno-card-body{font-size:13px;line-height:1.7;color:var(--el-text-color-regular)}
.anno-card-body p{margin:4px 0}
.anno-card-body ul{margin:4px 0;padding-left:18px}
.anno-card-body li{margin:2px 0}
.anno-card-body .code{font-family:monospace;background:#f5f7fa;padding:1px 4px;border-radius:2px;font-size:12px}
.anno-card-body .label-tag{display:inline-block;background:var(--el-color-primary-light-9);color:var(--el-color-primary);font-size:11px;padding:1px 6px;border-radius:2px;margin-right:4px}
.anno-card-body .label-danger{background:var(--el-color-danger-light);color:var(--el-color-danger)}
.anno-card-body .label-warn{background:var(--el-color-warning-light);color:var(--el-color-warning)}
.anno-card-body .label-ok{background:var(--el-color-success-light);color:var(--el-color-success)}

.anchor-badge{display:inline-flex;width:20px;height:20px;align-items:center;justify-content:center;border-radius:50%;background:var(--annotation-accent);color:#5a3e00;font-size:11px;font-weight:700;margin-left:6px;vertical-align:middle;flex:0 0 auto}

@media(max-width:900px){
  .prototype-shell{grid-template-columns:1fr}
  .prototype-right{height:auto;max-height:45vh;border-left:0;border-top:1px solid var(--el-border-color-light)}
  .app{min-width:100%}
  .aside{display:none}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .form-row{grid-template-columns:1fr}
  .impact-grid{grid-template-columns:1fr}
  .modal{width:95%}
}
</style>
</head>
<body>
<div class="prototype-shell">
<div class="prototype-left">
<div class="app">
<aside class="aside">
  <div class="brand"><div class="brand-mark">L</div><div>LuteOS IoT<br><span class="brand-subtitle">Admin Platform</span></div></div>
  <nav class="menu">
    <div class="menu-group-title">产品管理</div>
    <div class="menu-item active"><span class="menu-dot"></span>智能产品</div>
    <div class="menu-item"><span class="menu-dot"></span>设备管理</div>
    <div class="menu-item"><span class="menu-dot"></span>固件管理</div>
    <div class="menu-item"><span class="menu-dot"></span>OTA任务</div>
    <div class="menu-group-title">应用管理</div>
    <div class="menu-item"><span class="menu-dot"></span>App管理</div>
    <div class="menu-item"><span class="menu-dot"></span>消息推送</div>
    <div class="menu-group-title">配置中心</div>
    <div class="menu-item"><span class="menu-dot"></span>物模型池</div>
    <div class="menu-item"><span class="menu-dot"></span>产品模板</div>
    <div class="menu-group-title">生产管理</div>
    <div class="menu-item"><span class="menu-dot"></span>生产凭证</div>
    <div class="menu-item"><span class="menu-dot"></span>生产记录</div>
  </nav>
</aside>
<div class="shell-area">
<header class="header">
  <div class="breadcrumb">IoT Admin / 智能产品 / <strong>产品详情</strong></div>
  <div class="userbar"><span>admin@luteos</span><div class="avatar">A</div></div>
</header>
<div class="content" id="content"></div>
</div>
</div>
</div>
<aside class="prototype-right">
  <div class="anno-header">
    <h2 class="anno-title">原型批注</h2>
    <div class="anno-caption">黄色编号是批注锚点，不属于真实 IoT Admin 页面。点击下方场景按钮切换状态。</div>
  </div>
 <div id="scenarioBar"></div>
 <div class="anno-list" id="annoList"></div>
</aside>
</div>
<div class="modal-scrim" id="modalScrim"></div>
<script>
const STATES = {
  DEFAULT: 'default', PRECHECK: 'precheck', CONFLICT: 'conflict',
  OVERWRITE: 'overwrite', NEW_PRODUCT: 'newProduct', SYNCING: 'syncing',
  SUCCESS: 'success', FAILURE: 'failure'
};
let currentState = STATES.DEFAULT;
let scenario = 'conflict';
let overwriteChecked = false;
let syncResultType = '新建产品';
let syncTimer = null;
let syncSteps = [
  {name:'step0 基础信息',status:'pending'},
  {name:'step1 功能设计',status:'pending'},
  {name:'step2 扩展程序（panelImpType）',status:'pending'},
  {name:'step3 设备调试（协议转换脚本）',status:'pending'},
  {name:'step4 配网引导',status:'pending'},
  {name:'step5 高级配置',status:'pending'},
  {name:'产品级 secret',status:'pending'}
];

const productData = {
  name: 'W1 Lite', productId: '2075767415740338177', productKey: 'a1b2c3d4e5f6',
  cloud: 'ROOT云', status: '已上架', category: 'Breast Pump', model: 'W1Lite',
  commMethod: 'BLE', provisioning: '蓝牙配网', binding: '弱绑定', app: 'momcozy',
  funcVersion: '版本1 - 已发布', productCode: '--', templateId: '1907328212561108993'
};

const conflictData = {
  targetName: 'W1 Lite', productKey: 'a1b2c3d4e5f6',
  deviceCount: 128, otaTasks: 3, messageRules: 5, appBindings: 2,
  diffs: [
    {field:'产品状态',from:'已上架',to:'开发中'},
    {field:'功能版本',from:'版本1 - 已发布',to:'未发布'},
    {field:'配网交互方式',from:'CONNECT_F0',to:'CONNECT_F1'},
    {field:'原子化配网',from:'支持',to:'不支持'}
  ]
};

function renderContent(){
  document.getElementById('content').innerHTML = renderDefaultPage();
  renderModal();
}

function renderDefaultPage(){
  var s = currentState;
  return '' +
  '<div class="product-summary">' +
    '<div class="product-title-row">' +
      '<div class="product-name-line">' +
        '<h1 class="product-name">'+productData.name+'</h1>' +
        '<span class="tag tag-success">'+productData.status+'</span>' +
        '<span class="tag tag-info">'+productData.cloud+'</span>' +
        '<span class="product-cloud">功能版本：'+productData.funcVersion+'</span>' +
      '</div>' +

function renderModal(){
  var scrim = document.getElementById('modalScrim');
  var html = '';
  switch(currentState){
    case STATES.PRECHECK: html = renderPrecheckModal(); break;
    case STATES.CONFLICT: html = renderConflictModal(); break;
    case STATES.OVERWRITE: html = renderOverwriteModal(); break;
    case STATES.NEW_PRODUCT: html = renderNewProductModal(); break;
    case STATES.SYNCING: html = renderSyncingModal(); break;
    case STATES.SUCCESS: html = renderSuccessModal(); break;
    case STATES.FAILURE: html = renderFailureModal(); break;
  }
  if(html){ scrim.innerHTML = html; scrim.classList.add('open'); }
  else { scrim.classList.remove('open'); scrim.innerHTML = ''; }
}

function renderScenarioBar(){
  var s = currentState;
  document.getElementById('scenarioBar').innerHTML =
    '<div class="scenario-bar anno-scenario">' +
      '<span class="label">原型场景切换</span>' +
      '<button class="scenario-btn '+(s===STATES.DEFAULT?'active':'')+'" onclick="goDefault()">默认页面</button>' +
      '<button class="scenario-btn '+(s===STATES.CONFLICT?'active':'')+'" onclick="goConflict()">冲突弹窗</button>' +
      '<button class="scenario-btn '+(s===STATES.NEW_PRODUCT?'active':'')+'" onclick="goNewProduct()">新建确认</button>' +
      '<button class="scenario-btn '+(s===STATES.SYNCING?'active':'')+'" onclick="goSyncing()">同步执行中</button>' +
      '<button class="scenario-btn '+(s===STATES.SUCCESS?'active':'')+'" onclick="goSuccess()">同步成功</button>' +
      '<button class="scenario-btn '+(s===STATES.FAILURE?'active':'')+'" onclick="goFailure()">同步失败</button>' +
    '</div>';
}

function renderAnnotations(){
  var list = annotations[currentState] || [];
  document.getElementById('annoList').innerHTML = list.map(function(a){
    return '<div class="anno-card">' +
      '<div class="anno-card-title"><span class="anno-number">'+a.n+'</span>'+a.title+'</div>' +
      '<div class="anno-card-body">'+a.body+'</div>' +
    '</div>';
  }).join('');
}

function goDefault(){ cleanup(); currentState=STATES.DEFAULT; render(); }
function goConflict(){ currentState=STATES.CONFLICT; render(); }
function goOverwrite(){ overwriteChecked=false; currentState=STATES.OVERWRITE; render(); }
function goNewProduct(){ currentState=STATES.NEW_PRODUCT; render(); }
function goSyncing(){ resetSteps(); currentState=STATES.SYNCING; render(); runSyncStep(0); }
function goSuccess(){ syncSteps=syncSteps.map(function(s){return{name:s.name,status:'success',error:null};}); currentState=STATES.SUCCESS; render(); }
function goFailure(){ setFailureSteps(); currentState=STATES.FAILURE; render(); }

function clickSync(){
  currentState = STATES.PRECHECK;
  render();
  setTimeout(function(){
    if(scenario==='conflict') goConflict();
    else goNewProduct();
  },1500);
}

function toggleOverwrite(el){
  overwriteChecked = el.checked;
  var btn = document.getElementById('overwriteBtn');
  if(btn) btn.disabled = !overwriteChecked;
}

function resetSteps(){
  syncSteps = syncSteps.map(function(s){return{name:s.name,status:'pending',error:null};});
}

function setFailureSteps(){
  syncSteps = syncSteps.map(function(s,i){
    if(i<2) return{name:s.name,status:'success',error:null};
    if(i===2) return{name:s.name,status:'failure',error:'连接超时'};
    return{name:s.name,status:'pending',error:null};
  });
}

function startSync(type){
  syncResultType = type==='overwrite'?'强制覆盖':'新建产品';
  resetSteps();
  currentState = STATES.SYNCING;
  render();
  runSyncStep(0);
}

function runSyncStep(i){
  if(i>=syncSteps.length){
    currentState = STATES.SUCCESS;
    render();
    return;
  }
  syncSteps[i].status = 'syncing';
  renderModal();
  setTimeout(function(){
    syncSteps[i].status = 'success';
    runSyncStep(i+1);
  },800);
}

function cancelSync(){
  cleanup();
  goDefault();
}

function retrySync(){
  resetSteps();
  currentState = STATES.SYNCING;
  render();
  runSyncStep(0);
}

function cleanup(){
  if(syncTimer){ clearTimeout(syncTimer); syncTimer=null; }
}

function render(){ renderContent(); renderScenarioBar(); renderAnnotations(); }
render();
</script>
