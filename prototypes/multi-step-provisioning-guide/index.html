<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>云端多步骤配网引导扩展字段原型</title>
  <style>
    :root {
      --app-aside-bg-color: #001529;
      --app-aside-bg-active: #0b2a4a;
      --app-bg-color: #f9f9f9;
      --el-bg-color: #ffffff;
      --el-color-primary: #4372ff;
      --el-color-primary-dark-2: #2b6bd9;
      --el-color-primary-light-7: #e0ecff;
      --el-color-primary-light-9: #ecf5ff;
      --el-color-success: #67c23a;
      --el-color-warning: #e6a23c;
      --el-color-danger: #f56c6c;
      --el-color-info: #909399;
      --el-text-color-primary: #303133;
      --el-text-color-regular: #606266;
      --el-text-color-secondary: #909399;
      --el-text-color-placeholder: #a8abb2;
      --el-border-color: #dcdfe6;
      --el-border-color-light: #e4e7ed;
      --el-border-color-lighter: #ebeef5;
      --table-head-bg: #fafafa;
      --radius: 4px;
      --gap-8: 8px;
      --gap-12: 12px;
      --gap-16: 16px;
      --gap-24: 24px;
      --aside-width: 208px;
      --header-height: 54px;
      --annotation-width: 380px;
      --sans: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #eef1f6;
      color: var(--el-text-color-primary);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button { cursor: pointer; }

    .prototype-shell {
      height: 100vh;
      min-height: 720px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--annotation-width);
      gap: 0;
      background: #eef1f6;
    }

    .product-pane {
      min-width: 0;
      min-height: 0;
      overflow: auto;
      padding: 16px;
    }

    .product-canvas {
      width: 1440px;
      min-height: calc(100vh - 32px);
      margin: 0 auto;
      background: var(--app-bg-color);
      display: grid;
      grid-template-columns: var(--aside-width) minmax(0, 1fr);
      border: 1px solid #d8dde8;
      box-shadow: 0 8px 24px rgba(0, 21, 41, .08);
      position: relative;
    }

    .aside {
      background: var(--app-aside-bg-color);
      color: rgba(255, 255, 255, .72);
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .brand {
      height: 64px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
      color: #fff;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      display: grid;
      place-items: center;
      background: #85b436;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-title {
      font-weight: 700;
      line-height: 18px;
    }

    .brand-subtitle {
      color: rgba(255,255,255,.52);
      font-size: 12px;
      line-height: 16px;
    }

    .menu {
      padding: 8px 0 24px;
    }

    .menu-group-title,
    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 18px;
      white-space: nowrap;
    }

    .menu-group-title {
      height: 36px;
      margin-top: 8px;
      color: rgba(255,255,255,.38);
      font-size: 12px;
    }

    .menu-item {
      height: 42px;
      border-left: 3px solid transparent;
      color: rgba(255,255,255,.76);
    }

    .menu-item.active {
      background: var(--app-aside-bg-active);
      border-left-color: var(--el-color-primary);
      color: #fff;
    }

    .menu-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      opacity: .75;
      flex: 0 0 auto;
    }

    .app-main {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: var(--header-height) minmax(0, 1fr);
    }

    .header {
      height: var(--header-height);
      background: var(--el-bg-color);
      box-shadow: rgba(0, 0, 0, .06) 0 -1px 0 0 inset;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      gap: var(--gap-16);
    }

    .breadcrumb {
      color: var(--el-text-color-secondary);
      font-size: 12px;
      line-height: 22px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .breadcrumb strong {
      color: var(--el-text-color-primary);
      font-weight: 500;
    }

    .userbar {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--el-text-color-regular);
      font-size: 13px;
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--el-color-primary-light-9);
      color: var(--el-color-primary);
      display: grid;
      place-items: center;
      font-weight: 700;
    }

    .content {
      padding: 24px;
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 16px;
    }

    .summary-card,
    .detail-card {
      background: var(--el-bg-color);
      border: 1px solid var(--el-border-color-light);
      border-radius: var(--radius);
    }

    .summary-card {
      padding: 16px 20px;
      margin-bottom: 0;
    }

    .summary-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--gap-16);
      margin-bottom: 12px;
    }

    .product-name {
      font-size: 18px;
      font-weight: 600;
      margin-right: 10px;
    }

    .summary-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 8px;
      border-radius: 4px;
      font-size: 12px;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .tag-success {
      background: #f0f9eb;
      color: #529b2e;
      border-color: #d1edc4;
    }

    .tag-info {
      background: #f4f4f5;
      color: #73767a;
      border-color: #e9e9eb;
    }

    .tag-warning {
      background: #fdf6ec;
      color: #b88230;
      border-color: #faecd8;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px 24px;
      color: var(--el-text-color-regular);
      font-size: 13px;
    }

    .summary-grid span {
      color: var(--el-text-color-secondary);
      margin-right: 4px;
    }

    .button {
      height: 32px;
      padding: 0 16px;
      border-radius: var(--radius);
      border: 1px solid var(--el-border-color);
      background: #fff;
      color: var(--el-text-color-regular);
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }

    .button:hover {
      border-color: var(--el-color-primary);
      color: var(--el-color-primary);
    }

    .button.primary {
      background: var(--el-color-primary);
      border-color: var(--el-color-primary);
      color: #fff;
    }

    .button.success {
      color: var(--el-color-success);
      border-color: #b3e19d;
      background: #f0f9eb;
    }

    .button.text {
      border-color: transparent;
      background: transparent;
      color: var(--el-color-primary);
      padding: 0 8px;
    }

    .button.danger {
      color: var(--el-color-danger);
      border-color: #fbc4c4;
      background: #fef0f0;
    }

    .button:disabled {
      cursor: not-allowed;
      color: #c0c4cc;
      border-color: #e4e7ed;
      background: #f5f7fa;
    }

    .steps-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--el-border-color-light);
      margin-bottom: 16px;
      background: #fff;
    }

    .steps-tabs button {
      height: 48px;
      border: 0;
      background: #fff;
      padding: 0 22px;
      color: var(--el-text-color-regular);
      border-bottom: 2px solid transparent;
      font-weight: 500;
    }

    .steps-tabs button.active {
      color: var(--el-color-primary);
      border-bottom-color: var(--el-color-primary);
    }

    .detail-card {
      min-height: 0;
      padding: 0;
      overflow: hidden;
      position: relative;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) 64px;
    }

    .config-area {
      padding: 16px 24px 24px;
      min-height: 0;
      overflow: auto;
    }

    .pager-actions {
      height: 64px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      align-items: center;
      border-top: 1px solid var(--el-border-color-light);
      padding: 0 24px;
      background: #fff;
    }

    .top-line {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: var(--gap-16);
      margin-bottom: 12px;
    }

    .button-group {
      display: inline-flex;
      vertical-align: middle;
    }

    .seg-button {
      height: 32px;
      padding: 0 16px;
      border: 1px solid var(--el-border-color);
      background: #fff;
      color: var(--el-text-color-regular);
      margin-left: -1px;
      font-weight: 500;
    }

    .seg-button:first-child {
      margin-left: 0;
      border-top-left-radius: var(--radius);
      border-bottom-left-radius: var(--radius);
    }

    .seg-button:last-child {
      border-top-right-radius: var(--radius);
      border-bottom-right-radius: var(--radius);
    }

    .seg-button.active {
      background: var(--el-color-primary);
      border-color: var(--el-color-primary);
      color: #fff;
      z-index: 1;
    }

    .sub-entry {
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .qr-prefix {
      color: var(--el-text-color-regular);
      margin-left: 12px;
    }

    .qr-prefix span {
      color: var(--el-text-color-secondary);
    }

    .language-tabs {
      height: 40px;
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--el-border-color-light);
      overflow: hidden;
      margin-bottom: 24px;
    }

    .language-tabs button {
      border: 0;
      background: #fff;
      padding: 0 18px;
      color: var(--el-text-color-regular);
      border-bottom: 2px solid transparent;
      white-space: nowrap;
    }

    .language-tabs button.active {
      color: var(--el-color-primary);
      border-bottom-color: var(--el-color-primary);
      font-weight: 500;
    }

    .view-title {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 8px;
    }

    .steps-view {
      width: 900px;
      margin-left: 64px;
      padding-bottom: 32px;
    }

    .empty-state {
      height: 220px;
      display: grid;
      place-items: center;
      color: var(--el-text-color-secondary);
      border: 1px dashed var(--el-border-color);
      border-radius: var(--radius);
      background: #fcfcfc;
    }

    .step-item {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      gap: 12px;
      position: relative;
      min-height: 178px;
    }

    .step-item:not(:last-child)::before {
      content: "";
      position: absolute;
      left: 11px;
      top: 28px;
      bottom: -2px;
      width: 1px;
      background: var(--el-border-color-light);
    }

    .step-index {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--el-color-primary);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 12px;
      position: relative;
      z-index: 1;
    }

    .step-main {
      padding-bottom: 28px;
    }

    .step-title {
      color: var(--el-text-color-primary);
      font-weight: 600;
      margin: 2px 0 10px;
    }

    .desc-table {
      width: 100%;
      border-collapse: collapse;
      color: var(--el-text-color-regular);
      border: 1px solid var(--el-border-color-lighter);
      background: #fff;
    }

    .desc-table tr {
      border-bottom: 1px solid var(--el-border-color-lighter);
    }

    .desc-table tr:last-child {
      border-bottom: 0;
    }

    .desc-table th,
    .desc-table td {
      text-align: left;
      padding: 9px 12px;
      vertical-align: top;
      font-weight: 400;
    }

    .desc-table th {
      width: 150px;
      color: var(--el-text-color-secondary);
      background: #fafafa;
    }

    .thumb-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .thumb {
      width: 86px;
      height: 62px;
      border-radius: 4px;
      border: 1px solid var(--el-border-color-light);
      background:
        linear-gradient(135deg, #eef3ff, #f8fbff);
      display: grid;
      place-items: center;
      color: var(--el-color-primary);
      font-size: 12px;
    }

    .sub-steps {
      display: grid;
      gap: 8px;
    }

    .sub-step-card {
      border: 1px solid var(--el-border-color-light);
      border-radius: var(--radius);
      padding: 10px;
      background: #fcfdff;
    }

    .sub-step-title {
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--el-text-color-primary);
    }

    .drawer-mask {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, .28);
      z-index: 40;
      display: none;
      align-items: stretch;
      justify-content: flex-end;
    }

    .drawer-mask.open {
      display: flex;
    }

    .drawer {
      width: 720px;
      height: 100%;
      background: #fff;
      box-shadow: -4px 0 16px rgba(0, 0, 0, .12);
      display: grid;
      grid-template-rows: 56px minmax(0, 1fr) 64px;
      animation: slideIn .16s ease-out;
    }

    @keyframes slideIn {
      from { transform: translateX(24px); opacity: .7; }
      to { transform: translateX(0); opacity: 1; }
    }

    .drawer-header,
    .drawer-footer {
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid var(--el-border-color-light);
    }

    .drawer-header {
      justify-content: space-between;
    }

    .drawer-title {
      font-size: 16px;
      font-weight: 500;
    }

    .drawer-close {
      width: 32px;
      height: 32px;
      border: 0;
      background: transparent;
      color: var(--el-text-color-secondary);
      font-size: 22px;
      line-height: 32px;
    }

    .drawer-body {
      overflow: auto;
      padding: 16px 20px;
      background: #fff;
    }

    .drawer-footer {
      border-top: 1px solid var(--el-border-color-light);
      border-bottom: 0;
      justify-content: flex-end;
      gap: 12px;
      background: #fff;
    }

    .drawer-layout {
      display: grid;
      grid-template-columns: 168px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .step-nav {
      position: sticky;
      top: 0;
      border: 1px solid var(--el-border-color-light);
      border-radius: var(--radius);
      overflow: hidden;
      background: #fff;
    }

    .step-nav button {
      width: 100%;
      min-height: 40px;
      border: 0;
      border-bottom: 1px solid var(--el-border-color-lighter);
      background: #fff;
      text-align: left;
      padding: 0 12px;
      color: var(--el-text-color-regular);
    }

    .step-nav button:last-child {
      border-bottom: 0;
    }

    .step-nav button.active {
      color: var(--el-color-primary);
      background: var(--el-color-primary-light-9);
      font-weight: 500;
    }

    .form-panel {
      min-width: 0;
    }

    .form-step {
      border: 1px solid var(--el-border-color-light);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
      background: #fff;
    }

    .form-step-header {
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 12px;
      background: #fafafa;
      border-bottom: 1px solid var(--el-border-color-light);
      font-weight: 600;
    }

    .form-step-body {
      padding: 12px 16px 14px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 116px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      margin-bottom: 12px;
    }

    .form-label {
      min-height: 32px;
      line-height: 32px;
      text-align: right;
      color: var(--el-text-color-regular);
    }

    .required::before {
      content: "*";
      color: var(--el-color-danger);
      margin-right: 4px;
    }

    .form-control {
      min-width: 0;
    }

    .input,
    .textarea {
      width: 100%;
      border: 1px solid var(--el-border-color);
      border-radius: var(--radius);
      color: var(--el-text-color-primary);
      background: #fff;
      outline: none;
    }

    .input {
      height: 32px;
      padding: 0 11px;
    }

    .textarea {
      min-height: 62px;
      padding: 7px 11px;
      resize: vertical;
    }

    .input:focus,
    .textarea:focus {
      border-color: var(--el-color-primary);
    }

    .input:disabled,
    .textarea:disabled {
      cursor: not-allowed;
      color: var(--el-text-color-placeholder);
      border-color: #e4e7ed;
      background: #f5f7fa;
    }

    .has-error .input,
    .has-error .textarea,
    .has-error .upload-box {
      border-color: var(--el-color-danger);
    }

    .error-text {
      color: var(--el-color-danger);
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }

    .has-error .error-text {
      display: block;
    }

    .helper-text {
      color: var(--el-text-color-secondary);
      font-size: 12px;
      margin-top: 4px;
    }

    .static-value {
      min-height: 32px;
      display: flex;
      align-items: center;
      color: var(--el-text-color-regular);
    }

    .upload-box {
      width: 124px;
      height: 82px;
      border: 1px dashed var(--el-border-color);
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      background: #fafafa;
      color: var(--el-text-color-secondary);
      text-align: center;
      font-size: 12px;
    }

    .upload-box.filled {
      border-style: solid;
      background: linear-gradient(135deg, #eef3ff, #f9fcff);
      color: var(--el-color-primary);
    }

    .switch-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 32px;
    }

    .switch {
      width: 42px;
      height: 22px;
      border-radius: 20px;
      border: 0;
      background: #dcdfe6;
      position: relative;
      padding: 0;
    }

    .switch::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      background: #fff;
      transition: left .15s ease;
    }

    .switch.on {
      background: var(--el-color-primary);
    }

    .switch.on::after {
      left: 22px;
    }

    .sub-form {
      border: 1px solid var(--el-border-color-light);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 12px;
      background: #fcfdff;
    }

    .sub-form-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .toast {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 180px;
      height: 40px;
      border-radius: var(--radius);
      background: #f0f9eb;
      border: 1px solid #d1edc4;
      color: #529b2e;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 70;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
    }

    .toast.show {
      display: flex;
    }

    .anchor {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--el-color-warning);
      color: #fff;
      display: inline-grid;
      place-items: center;
      font-size: 12px;
      font-weight: 700;
      margin-left: 6px;
      vertical-align: middle;
      box-shadow: 0 0 0 2px #fff;
    }

    .anchored {
      position: relative;
      transition: box-shadow .15s ease, outline-color .15s ease;
    }

    .anchored.highlight {
      outline: 2px solid var(--el-color-warning);
      outline-offset: 3px;
      box-shadow: 0 0 0 5px rgba(230, 162, 60, .16);
    }

    .annotation-pane {
      min-width: 0;
      height: 100vh;
      position: sticky;
      top: 0;
      background: #fff;
      border-left: 1px solid #d8dde8;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .annotation-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--el-border-color-light);
    }

    .annotation-header h1 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 24px;
    }

        });
        const qr = document.createElement("div");
        qr.className = "qr-prefix";
        qr.innerHTML = "<span>二维码前缀：</span>V300";
        sub.appendChild(qr);
      } else {
        sub.innerHTML = "";
      }
    }

    function renderLanguages() {
      const tabs = el("languageTabs");
      tabs.innerHTML = "";
      languages.forEach(lang => {
        const btn = document.createElement("button");
        btn.textContent = lang;
        btn.className = lang === state.language ? "active" : "";
        btn.addEventListener("click", () => {
          state.language = lang;
          state.scenario = isTargetEntry() ? (activeTargetSteps() ? "target-filled" : "target-empty") : state.scenario;
          setAnnotation("3");
          renderAll();
        });
        tabs.appendChild(btn);
      });
    }

    function renderContent() {
      const view = el("contentView");
      const editButton = el("editButton");
      editButton.style.display = "inline-flex";
      if (isTargetEntry()) {
        const steps = activeTargetSteps();
        if (!steps) {
          view.innerHTML = `<div class="steps-view anchored" data-anchor="4"><div class="empty-state">未配置</div></div>`;
        } else {
          view.innerHTML = renderSteps(steps, true);
        }
      } else if (state.productType === "wifi" && state.entry === "AP配网") {
        view.innerHTML = renderSteps(currentGuideSteps, false);
      } else if (hasBleSubEntries()) {
        view.innerHTML = `<div class="steps-view anchored" data-anchor="12"><div class="empty-state">未配置</div></div>`;
      } else {
        view.innerHTML = `<div class="steps-view anchored" data-anchor="12"><div class="empty-state">未配置</div></div>`;
      }
      wireAnchors();
    }

    function renderSteps(steps, isMulti) {
      const rows = steps.map((step, index) => {
        const helper = step.helper || "";
        const button = step.button || "";
        const imageName = step.image || "";
        const selectable = isMulti ? (step.selectable ? "启用" : "--") : null;
        const guide = isMulti ? renderGuide(step) : "";
        const cells = [
          ["配网文案：", step.copy || "--"],
          ["配网引导图：", imageName ? `<div class="thumb-row"><div class="thumb">图片</div><span>${imageName}</span></div>` : "--"],
          ["辅助文案：", helper || "--"],
          ...(isMulti ? [["辅助文案支持选中能力：", selectable]] : []),
          ["按钮文案：", button || "--"],
          ...(isMulti ? [["引导文案：", step.guideEnabled ? (step.guideText || "--") : "--"], ["引导文案子步骤：", guide || "--"]] : [])
        ].map(([label, value]) => `<tr><th>${label}</th><td>${value}</td></tr>`).join("");
        return `
          <div class="step-item">
            <div class="step-index">${index + 1}</div>
            <div class="step-main">
              <div class="step-title">步骤 ${index + 1}</div>
              <table class="desc-table">${cells}</table>
            </div>
          </div>
        `;
      }).join("");
      return `<div class="steps-view anchored" data-anchor="4">${rows}</div>`;
    }

    function renderGuide(step) {
      if (!step.guideEnabled || !step.subSteps.length) return "";
      return `<div class="sub-steps">${step.subSteps.map((sub, idx) => `
        <div class="sub-step-card">
          <div class="sub-step-title">${idx + 1}. ${sub.title || "--"}</div>
          <div style="color:var(--el-text-color-secondary);margin-bottom:4px;">图片：${sub.image || "--"}</div>
          <div>${sub.text || "--"}</div>
        </div>
      `).join("")}</div>`;
    }

    function renderDrawer() {
      const mask = el("drawerMask");
      mask.classList.toggle("open", state.drawerOpen);
      if (!state.drawerOpen) return;
      const title = drawerTitle();
      const drawer = document.querySelector(".drawer");
      document.querySelector(".drawer-title").textContent = title;
      drawer.setAttribute("aria-label", title);

      const nav = el("drawerStepNav");
      nav.innerHTML = "";
      state.drawerSteps.forEach((step, index) => {
        const btn = document.createElement("button");
        btn.className = index === state.activeDrawerStep ? "active" : "";
        btn.textContent = `步骤 ${index + 1}`;
        btn.addEventListener("click", () => {
          state.activeDrawerStep = index;
          setAnnotation("6");
          renderDrawer();
        });
        nav.appendChild(btn);
      });
      if (state.drawerSteps.length < EXISTING_STEP_LIMIT) {
        const add = document.createElement("button");
        add.textContent = "+ 新增步骤";
        add.addEventListener("click", () => {
          if (state.drawerSteps.length >= EXISTING_STEP_LIMIT) return;
          state.drawerSteps.push(emptyStep());
          state.activeDrawerStep = state.drawerSteps.length - 1;
          setAnnotation("6");
          renderDrawer();
        });
        nav.appendChild(add);
      }

      const form = el("drawerForm");
      form.classList.toggle("simple-guide", isBleSingleStepEntry() && !state.drawerIsTarget);
      form.innerHTML = state.drawerSteps.map((step, index) => renderFormStep(step, index)).join("");
      wireFormEvents();
      wireAnchors();
    }

    function errorKey(stepIndex, field, subIndex = null) {
      return subIndex === null ? `${stepIndex}.${field}` : `${stepIndex}.sub.${subIndex}.${field}`;
    }

    function hasError(stepIndex, field, subIndex = null) {
      return Boolean(state.errors[errorKey(stepIndex, field, subIndex)]);
    }

    function errorText(stepIndex, field, subIndex = null) {
      return state.errors[errorKey(stepIndex, field, subIndex)] || "";
    }

    function renderFormStep(step, index) {
      const showExtensions = state.drawerIsTarget;
      const simpleBleGuide = isBleSingleStepEntry() && !state.drawerIsTarget;
      const showOptionalLegacyFields = !simpleBleGuide;
      const active = index === state.activeDrawerStep;
      const display = active ? "" : "display:none";
      const guideHasError = showExtensions && (hasError(index, "guideText") || hasError(index, "guideSub"));
      const subForms = showExtensions && step.guideEnabled ? `
        <div class="form-row anchored" data-anchor="9">
          <div class="form-label">子步骤</div>
          <div class="form-control">
            ${step.subSteps.map((sub, subIndex) => renderSubForm(index, sub, subIndex)).join("")}
            <button class="button" data-action="add-sub" data-step="${index}" ${step.subSteps.length >= 3 ? "disabled" : ""}>新增子步骤</button>
            <div class="helper-text">最多 3 个子步骤，图片可选，标题和正文必填。</div>
          </div>
        </div>` : "";

      return `
        <section class="form-step" style="${display}" data-step-index="${index}">
          <div class="form-step-header">
            <span>步骤 ${index + 1}</span>
            <button class="button danger" data-action="delete-step" data-step="${index}" ${state.drawerSteps.length <= 1 ? "disabled" : ""}>删除步骤</button>
          </div>
          <div class="form-step-body anchored" data-anchor="6">
            ${simpleBleGuide ? `<div class="form-row">
              <div class="form-label">语言</div>
              <div class="form-control">
                <div class="static-value">${state.language}</div>
              </div>
            </div>
            <div class="form-row">
              <div class="form-label">配网指引</div>
              <div class="form-control">
                <div class="static-value">步骤 ${index + 1}</div>
              </div>
            </div>` : ""}
            <div class="form-row ${hasError(index, "image") ? "has-error" : ""}">
              <div class="form-label required">配网引导图</div>
              <div class="form-control">
                <button class="upload-box ${step.image ? "filled" : ""}" data-action="toggle-image" data-step="${index}" type="button">${step.image ? `已上传<br>${step.image}` : "+<br>上传图片"}</button>
                <div class="helper-text">建议尺寸 800px*600px，大小不超过 3M。${simpleBleGuide ? "支持 json 格式。" : ""}</div>
                <div class="error-text">${errorText(index, "image")}</div>
              </div>
            </div>
            <div class="form-row ${hasError(index, "copy") ? "has-error" : ""}">
              <div class="form-label required">配网文案</div>
              <div class="form-control">
                <textarea class="textarea" data-field="copy" data-step="${index}" maxlength="500" placeholder="请输入配网文案">${escapeHtml(step.copy)}</textarea>
                <div class="helper-text">${step.copy.length} / 500</div>
                <div class="error-text">${errorText(index, "copy")}</div>
              </div>
            </div>
            ${showOptionalLegacyFields ? `<div class="form-row">
              <div class="form-label">辅助文案</div>
              <div class="form-control">
                <input class="input" data-field="helper" data-step="${index}" maxlength="300" placeholder="请输入辅助文案" value="${escapeAttr(step.helper)}">
                <div class="helper-text">${step.helper.length} / 300</div>
              </div>
            </div>` : ""}
            ${showExtensions ? `<div class="form-row anchored" data-anchor="7">
              <div class="form-label">辅助文案支持选中能力</div>
              <div class="form-control">
                <div class="switch-row">
                  <button class="switch ${step.selectable ? "on" : ""}" data-action="toggle-selectable" data-step="${index}" type="button" aria-label="切换辅助文案支持选中能力"></button>
                  <span>${step.selectable ? "启用：App 页面内二次确认" : "未启用"}</span>
                </div>
              </div>
            </div>` : ""}
            ${showOptionalLegacyFields ? `<div class="form-row">
              <div class="form-label">按钮文案</div>
              <div class="form-control">
                <input class="input" data-field="button" data-step="${index}" maxlength="30" placeholder="请输入按钮文案" value="${escapeAttr(step.button)}">
                <div class="helper-text">${step.button.length} / 30</div>
              </div>
            </div>` : ""}
            ${showExtensions ? `<div class="form-row anchored ${guideHasError ? "has-error" : ""}" data-anchor="8">
              <div class="form-label ${step.guideEnabled ? "required" : ""}">引导文案</div>
              <div class="form-control">
                <div class="switch-row">
                  <button class="switch ${step.guideEnabled ? "on" : ""}" data-action="toggle-guide" data-step="${index}" type="button" aria-label="切换引导文案"></button>
                  <input class="input" style="max-width:260px" data-field="guideText" data-step="${index}" placeholder="请输入引导文案" value="${escapeAttr(step.guideText)}" ${step.guideEnabled ? "aria-required=\"true\"" : "disabled"}>
                </div>
                <div class="helper-text">${step.guideEnabled ? "启用后必填，与辅助文案支持选中能力互相独立。" : "未启用时不填写、不保存该字段。"}</div>
                <div class="error-text">${errorText(index, "guideText") || errorText(index, "guideSub")}</div>
              </div>
            </div>` : ""}
            ${subForms}
          </div>
        </section>
      `;
    }

    function renderSubForm(stepIndex, sub, subIndex) {
      return `
        <div class="sub-form">
          <div class="sub-form-header">
            <span>子步骤 ${subIndex + 1}</span>
            <button class="button danger" data-action="delete-sub" data-step="${stepIndex}" data-sub="${subIndex}" ${state.drawerSteps[stepIndex].subSteps.length <= 1 ? "disabled" : ""}>删除</button>
          </div>
          <div class="form-row" style="grid-template-columns:90px minmax(0,1fr);">
            <div class="form-label">图片</div>
            <div class="form-control">
              <button class="upload-box ${sub.image ? "filled" : ""}" data-action="toggle-sub-image" data-step="${stepIndex}" data-sub="${subIndex}" type="button">${sub.image ? `已上传<br>${sub.image}` : "+<br>上传图片"}</button>
            </div>
          </div>
          <div class="form-row ${hasError(stepIndex, "title", subIndex) ? "has-error" : ""}" style="grid-template-columns:90px minmax(0,1fr);">
            <div class="form-label required">标题</div>
            <div class="form-control">
              <input class="input" data-field="subTitle" data-step="${stepIndex}" data-sub="${subIndex}" placeholder="请输入子步骤标题" value="${escapeAttr(sub.title)}">
              <div class="error-text">${errorText(stepIndex, "title", subIndex)}</div>
            </div>
          </div>
          <div class="form-row ${hasError(stepIndex, "text", subIndex) ? "has-error" : ""}" style="grid-template-columns:90px minmax(0,1fr);margin-bottom:0;">
            <div class="form-label required">正文</div>
            <div class="form-control">
              <textarea class="textarea" data-field="subText" data-step="${stepIndex}" data-sub="${subIndex}" placeholder="请输入子步骤正文">${escapeHtml(sub.text)}</textarea>
              <div class="error-text">${errorText(stepIndex, "text", subIndex)}</div>
            </div>
          </div>
        </div>
      `;
    }

    function wireFormEvents() {
      document.querySelectorAll("[data-field]").forEach(node => {
        node.addEventListener("input", (event) => {
          const step = Number(node.dataset.step);
          const sub = node.dataset.sub !== undefined ? Number(node.dataset.sub) : null;
          const item = state.drawerSteps[step];
          const field = node.dataset.field;
          if (field === "subTitle") item.subSteps[sub].title = node.value;
          else if (field === "subText") item.subSteps[sub].text = node.value;
          else item[field] = node.value;
          state.errors = {};
        });
      });
      document.querySelectorAll("[data-action]").forEach(node => {
        node.addEventListener("click", () => {
          const action = node.dataset.action;
          const step = Number(node.dataset.step);
          const sub = node.dataset.sub !== undefined ? Number(node.dataset.sub) : null;
          const item = state.drawerSteps[step];
          if (action === "toggle-image") item.image = item.image ? "" : `step-${step + 1}.png`;
          if (action === "toggle-selectable") item.selectable = !item.selectable;
          if (action === "toggle-guide") {
            item.guideEnabled = !item.guideEnabled;
            if (item.guideEnabled && !item.subSteps.length) item.subSteps.push(emptySubStep());
          }
          if (action === "delete-step" && state.drawerSteps.length > 1) {
            state.drawerSteps.splice(step, 1);
            state.activeDrawerStep = Math.max(0, Math.min(state.activeDrawerStep, state.drawerSteps.length - 1));
          }
          if (action === "add-sub" && item.subSteps.length < 3) item.subSteps.push(emptySubStep());
          if (action === "delete-sub" && item.subSteps.length > 1) item.subSteps.splice(sub, 1);
          if (action === "toggle-sub-image") item.subSteps[sub].image = item.subSteps[sub].image ? "" : `sub-${step + 1}-${sub + 1}.png`;
          state.errors = {};
          setAnnotation(action.includes("sub") ? "9" : action === "toggle-guide" ? "8" : action === "toggle-selectable" ? "7" : "6");
          renderDrawer();
        });
      });
    }

    function validateDrawer() {
      const errors = {};
      state.drawerSteps.forEach((step, index) => {
        if (!step.image) errors[errorKey(index, "image")] = "请上传配网引导图";
        if (!step.copy.trim()) errors[errorKey(index, "copy")] = "请输入配网文案";
        if (state.drawerIsTarget && step.guideEnabled) {
          if (!step.guideText.trim()) errors[errorKey(index, "guideText")] = "请输入引导文案";
          if (!step.subSteps.length) errors[errorKey(index, "guideSub")] = "请至少新增 1 个子步骤";
          step.subSteps.forEach((sub, subIndex) => {
            if (!sub.title.trim()) errors[errorKey(index, "title", subIndex)] = "请输入子步骤标题";
            if (!sub.text.trim()) errors[errorKey(index, "text", subIndex)] = "请输入子步骤正文";
          });
        }
      });
      if (state.drawerSteps.length > EXISTING_STEP_LIMIT) {
        errors["stepLimit"] = `步骤数量不可超过现有入口限制（${EXISTING_STEP_LIMIT} 步）`;
      }
      state.errors = errors;
      return Object.keys(errors).length === 0;
    }

    function renderAnnotations() {
      const list = el("annotationList");
      const activeSet = state.drawerOpen ? annotations.drawer : annotations.page;
      list.innerHTML = activeSet.map(card => `
        <article class="annotation-card ${state.activeAnnotation === card.id ? "active" : ""}" data-annotation="${card.id}">
          <div class="annotation-title"><span class="annotation-number">${card.id}</span>${card.title}</div>
          <dl>
            <dt>关联位置</dt><dd>${card.location}</dd>
            <dt>触发条件</dt><dd>${card.trigger}</dd>
            <dt>系统响应</dt><dd>${card.response}</dd>
            <dt>校验规则 / PRD 边界</dt><dd><ul>${card.rules.map(rule => `<li>${rule}</li>`).join("")}</ul></dd>
          </dl>
        </article>
      `).join("");
      document.querySelectorAll(".annotation-card").forEach(card => {
        card.addEventListener("click", () => setAnnotation(card.dataset.annotation));
      });
      el("stateChips").innerHTML = [
        state.productType === "wifi" ? "Wi-Fi 样例" : "BLE 样例",
        state.entry,
        hasBleSubEntries() ? state.subEntry : "",
        state.language,
        state.drawerOpen ? "编辑抽屉" : "查看态"
      ].filter(Boolean).map(text => `<span class="state-chip">${text}</span>`).join("");
    }

    function wireAnchors() {
      document.querySelectorAll(".anchored").forEach(node => {
        const id = node.dataset.anchor;
        if (!node.querySelector(`:scope > .anchor[data-anchor-id="${id}"]`) && id) {
          const anchor = document.createElement("span");
          anchor.className = "anchor";
          anchor.dataset.anchorId = id;
          anchor.textContent = id;
          anchor.addEventListener("click", (event) => {
            event.stopPropagation();
            setAnnotation(id);
          });
          if (node.classList.contains("steps-view")) {
            node.prepend(anchor);
            anchor.style.position = "absolute";
            anchor.style.marginLeft = "-34px";
            anchor.style.marginTop = "4px";
          } else {
            node.appendChild(anchor);
          }
        }
        node.addEventListener("click", (event) => {
          if (event.target.closest("button,input,textarea,select,a")) return;
          setAnnotation(id);
        });
      });
      setAnnotation(state.activeAnnotation);
    }

    function renderAll() {
      renderProductMeta();
      syncScenarioSelect();
      renderEntries();
      renderLanguages();
      renderContent();
      renderDrawer();
      renderAnnotations();
    }

    function showToast() {
      const toast = el("toast");
      toast.classList.add("show");
      window.setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/"/g, "&quot;");
    }

    el("switchProductButton").addEventListener("click", () => {
      state.productType = state.productType === "wifi" ? "ble" : "wifi";
      state.entry = activeProduct().defaultEntry;
      state.subEntry = BLE_SINGLE_STEP;
      state.scenario = "current";
      state.language = "英文（默认）";
      state.drawerOpen = false;
      state.drawerIsTarget = false;
      setAnnotation("1");
      renderAll();
    });

    el("scenarioSelect").addEventListener("change", (event) => {
      const value = event.target.value;
      state.drawerOpen = false;
      state.drawerIsTarget = false;
      state.errors = {};
      if (value === "current") {
        state.scenario = "current";
        state.entry = activeProduct().defaultEntry;
        state.subEntry = BLE_SINGLE_STEP;
        state.language = "英文（默认）";
        setAnnotation("12");
      }
      if (value === "target-empty") {
        setTargetPath();
        state.scenario = "target-empty";
        state.language = "英文（默认）";
        delete state.targetConfigs[state.productType][state.language];
        setAnnotation(state.productType === "ble" ? "2" : "4");
      }
      if (value === "target-filled") {
        setTargetPath();
        state.scenario = "target-filled";
        state.language = "英文（默认）";
        state.targetConfigs[state.productType][state.language] = clone(extensionSeed);
        setAnnotation("4");
      }
      if (value === "non-target") {
        state.scenario = "non-target";
        state.language = "英文（默认）";
        if (state.productType === "wifi") {
          state.entry = "SmartConfig配网";
        } else {
          state.entry = "蓝牙配网";
          state.subEntry = BLE_SINGLE_STEP;
        }
        setAnnotation("12");
      }
      if (value === "validation") {
        setTargetPath();
        state.scenario = "validation";
        state.drawerOpen = true;
        state.drawerIsTarget = true;
        state.drawerSteps = [emptyStep()];
        state.activeDrawerStep = 0;
        state.errors = {};
        window.setTimeout(() => {
          validateDrawer();
          setAnnotation("11");
          renderAll();
        }, 0);
      }
      renderAll();
    });

    el("editButton").addEventListener("click", () => {
      state.drawerIsTarget = isTargetEntry();
      state.drawerOpen = true;
      state.drawerSteps = state.drawerIsTarget
        ? (activeTargetSteps() ? clone(activeTargetSteps()) : [emptyStep()])
        : (state.productType === "wifi" && state.entry === "AP配网" ? clone(currentGuideSteps) : [emptyStep()]);
      state.activeDrawerStep = 0;
      state.errors = {};
      setAnnotation("6");
      renderAll();
    });

    el("closeDrawerButton").addEventListener("click", () => {
      state.drawerOpen = false;
      state.drawerIsTarget = false;
      state.errors = {};
      setAnnotation("5");
      renderAll();
    });

    el("cancelButton").addEventListener("click", () => {
      state.drawerOpen = false;
      state.drawerIsTarget = false;
      state.errors = {};
      setAnnotation("10");
      renderAll();
    });

    el("confirmButton").addEventListener("click", () => {
      if (!validateDrawer()) {
        setAnnotation("11");
        renderAll();
        return;
      }
      const savedTarget = state.drawerIsTarget;
      state.drawerOpen = false;
      if (savedTarget) {
        state.targetConfigs[state.productType][state.language] = clone(state.drawerSteps);
        state.scenario = "target-filled";
      }
      state.drawerIsTarget = false;
      state.errors = {};
      setAnnotation(savedTarget ? "4" : "12");
      renderAll();
      showToast();
    });

    renderAll();
  </script>
</body>
</html>
