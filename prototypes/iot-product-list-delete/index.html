const assocMeta={device:['设备','/device-list','productId'],firmware:['固件','/firmware-list','productId'],ota:['OTA 任务','/ota','productId'],productionCertificate:['生产凭证','/production/certificate','productKey'],productionRecord:['生产记录','/production/record','productKey'],messagePush:['消息推送','/message-push','productId']};
const pages=[

{id:'noperm',title:'用户未授权删除',status:'隐藏删除入口',doc:'前置条件：当前登录用户不具备 删除产品 权限。操作列维持原有复制、查看，不出现删除入口。'},

{id:'concurrent',title:'提交时新增引用',status:'后端拒绝',doc:'前置条件：打开确认时无关联，提交时新增 OTA 引用。用于验证 TOCTOU 防护。'},
{id:'apiError',title:'后端检查异常',status:'提示重试',doc:'前置条件：删除检查接口异常或超时。页面不改变列表，仅给出错误提示，要求稍后重试。'},
{id:'spec',title:'查看接口契约',status:'P1 门禁',doc:'前置条件：查看后端返回结构和验收门禁，不改变产品列表页面布局。'}
];
let active='default',deleted=new Set();
const navEl=document.getElementById('nav'),screenEl=document.getElementById('screen'),docEl=document.getElementById('doc'),docSubEl=document.getElementById('docSub'),toastEl=document.getElementById('toast'),modalMaskEl=document.getElementById('modalMask'),modalContentEl=document.getElementById('modalContent');
function blocking(p){return Object.entries(p.assoc||{}).filter(([,v])=>v>0).map(([k,v])=>({type:k,count:v,meta:assocMeta[k]}));}
function renderNav(){navEl.innerHTML=pages.map(p=>`<button class="nav-btn ${p.id===active?'active':''}" data-id="${p.id}"><strong>${p.title}</strong><span>${p.status}</span></button>`).join('');navEl.querySelectorAll('button').forEach(b=>b.onclick=()=>{active=b.dataset.id;closeModal();render();});}
function productList(){let list=products.filter(p=>!deleted.has(p.id));if(active==='single')list=[products[5],products[0],products[1]];if(active==='multi')list=[products[4],products[3],products[0]];if(active==='confirm'||active==='concurrent')list=[products[0],products[3]];return list;}
function statusTag(s){return `<span class="tag ${s==='已上架'?'ok':s==='开发中'?'warn':'info'}">${s}</span>`}
function canShowDelete(p){return active!=='noperm' && (p.status==='开发中' || p.status==='已下架')}
function operationCell(p){const disabledHint=p.status==='已上架'?' title="已上架产品不展示删除入口"':'';return `<button class="el-button link">复制</button><button class="el-button link">查看</button>${canShowDelete(p)?`<button class="el-button link danger" data-del="${p.id}">删除</button>`:`<span class="op-placeholder"${disabledHint}></span>`}`}
function renderProductTable(){const rows=productList().map(p=>`<tr><td>${p.type}</td><td>${p.name}</td><td>${p.model}</td><td>${p.serviceModel}</td><td>${p.id}</td><td>${p.code}</td><td>${p.bind}</td><td>${p.deviceType}</td><td class="center"><span class="thumb"></span></td><td>${statusTag(p.status)}</td><td>${p.version.replace('迭代中','<span class="warning">迭代中</span>')}</td><td>${p.platform}</td><td>${p.app}</td><td>${p.comm}</td><td>${p.create}</td><td>${p.update}</td><td class="fixed-op">${operationCell(p)}</td></tr>`).join('');screenEl.innerHTML=`<div class="search-bar"><div class="search-left"><div class="select-shell wide">产品分类</div><div class="select-shell wide">所属APP</div><div class="select-shell">所属平台</div><div class="select-shell">通讯方式</div><div class="input-shell"><input placeholder="输入产品型号..."><div class="append-select">产品型号</div></div><div class="actions"><button class="el-button primary">查询</button><button class="el-button">重置</button></div></div><button class="el-button primary">＋ 创建产品</button></div><div class="table-scroll"><table class="iot-table"><thead><tr><th style="width:120px">产品分类</th><th style="width:150px">产品名称</th><th style="width:120px">产品型号</th><th style="width:110px">客服型号</th><th style="width:180px">产品ID</th><th style="width:110px">产品代码</th><th style="width:100px">绑定类型</th><th style="width:110px">设备类型</th><th style="width:90px" class="center">产品图片</th><th style="width:100px">产品状态</th><th style="width:150px">功能版本/状态</th><th style="width:110px">所属平台</th><th style="width:120px">所属App</th><th style="width:120px">通讯方式</th><th style="width:160px">创建时间</th><th style="width:160px">更新时间</th><th style="width:180px" class="fixed-op">操作</th></tr></thead><tbody>${rows}</tbody></table></div><div class="pagination"><span>共 163 条</span><button class="el-button" disabled>‹</button><span class="pager-num active">1</span><span class="pager-num">2</span><span class="pager-num">3</span><span class="pager-num">4</span><span class="pager-num">5</span><span class="pager-num">6</span><span>...</span><span class="pager-num">17</span><button class="el-button">›</button><span>10条/页</span></div>`;screenEl.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>onDelete(b.dataset.del));if(active==='confirm')setTimeout(()=>onDelete(products[0].id),60);}
function renderSpec(){screenEl.innerHTML=`<div class="search-bar"><strong>后端删除检查返回结构</strong></div><div class="table-scroll"><table class="iot-table" style="min-width:900px;width:900px"><thead><tr><th>字段</th><th>说明</th><th>示例</th></tr></thead><tbody><tr><td>canDelete</td><td>无阻断项时为 true</td><td>false</td></tr><tr><td>blockingAssociations</td><td>关联阻断数组</td><td>device, firmware, ota</td></tr><tr><td>associationType</td><td>关联类型</td><td>productionCertificate</td></tr><tr><td>count</td><td>关联数量</td><td>100</td></tr><tr><td>pagePath</td><td>处理页面路径</td><td>/production/certificate</td></tr><tr><td>filterHint</td><td>建议筛选</td><td>productKey=QCo7zl</td></tr></tbody></table></div><div class="pagination">P1 门禁：后端强检查、结构化返回、TOCTOU、审计记录、接口测试</div>`}
function mockBlocking(p){if(active==='single')return [{type:'firmware',count:3,meta:assocMeta.firmware}];if(active==='multi')return blocking(products.find(x=>x.id==='2041825749597954050'));return blocking(p)}
function onDelete(id){const p=products.find(x=>x.id===id);if(active==='apiError'){showToast('删除检查失败，请稍后重试');return}const b=mockBlocking(p);if(b.length)openBlocker(p,b);else openConfirm(p,false)}
function openBlocker(p,b){modalMaskEl.classList.add('show');modalContentEl.innerHTML=`<div class="modal-head"><strong>存在关联数据，暂不可删除</strong><button class="el-button link" onclick="closeModal()">关闭</button></div><div class="modal-body"><div class="alert danger">后端检查发现该产品存在关联数据。请先前往对应页面处理这些数据，再执行产品删除。</div><div class="summary"><span>产品名称</span><strong>${p.name}</strong><span>产品 ID</span><strong>${p.id}</strong><span>检查来源</span><strong>后端 blockingAssociations</strong></div><div class="assoc-list">${b.map(x=>`<div class="assoc"><strong>${x.meta[0]}</strong><div><div>关联数量：${x.count}</div><small>筛选提示：${x.meta[2]}=${x.meta[2]==='productKey'?'QCo7zl':p.id}</small></div><button class="el-button" onclick="jump('${x.meta[1]}')">打开 ${x.meta[1]}</button></div>`).join('')}</div></div><div class="modal-foot"><button class="el-button" onclick="closeModal()">我知道了</button></div>`}
function openConfirm(p,wrong){modalMaskEl.classList.add('show');modalContentEl.innerHTML=`<div class="modal-head"><strong>删除产品</strong><button class="el-button link" onclick="closeModal()">关闭</button></div><div class="modal-body"><div class="alert">删除后该产品将在列表中隐藏。本操作为软删，不会执行不可逆硬删。</div><div class="summary"><span>产品名称</span><strong>${p.name}</strong><span>产品 ID</span><strong>${p.id}</strong><span>关联检查</span><strong>canDelete=true，无阻断项</strong></div><div class="field"><label>请输入产品 ID 以确认删除</label><input id="confirmInput" value="${wrong?'WRONG-ID':''}" placeholder="${p.id}"><span class="help" id="confirmHelp">输入完全匹配后才能确认删除</span></div></div><div class="modal-foot"><button class="el-button" onclick="closeModal()">取消</button><button class="el-button primary" id="confirmBtn" disabled>确认删除</button></div>`;const input=document.getElementById('confirmInput'),btn=document.getElementById('confirmBtn'),help=document.getElementById('confirmHelp');input.oninput=()=>{const ok=input.value.trim()===p.id;btn.disabled=!ok;help.textContent=ok?'校验通过，可以提交软删':'产品 ID 不匹配，请重新输入'};btn.onclick=()=>submitDelete(p);input.oninput();}
function submitDelete(p){if(active==='concurrent'){openBlocker({...p,assoc:{ota:1}},[{type:'ota',count:1,meta:assocMeta.ota}]);showToast('产品状态已变化，请刷新后重试');return}deleted.add(p.id);closeModal();showToast('删除成功');render();}
function jump(path){showToast('原型跳转：'+path)}function closeModal(){modalMaskEl.classList.remove('show')}function showToast(t){toastEl.textContent=t;toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),1700)}
function renderDoc(){const p=pages.find(x=>x.id===active);docSubEl.textContent=p.status;docEl.innerHTML=`<p>${p.doc}</p><h3>还原约束</h3><ul><li>前置条件切换位于交互原型上层，不放在批注面板中。</li><li>主页面保持产品列表原布局、原筛选项、原表格字段和分页。</li><li>需求范围只新增操作列中的删除动作与相关弹窗。</li></ul><h3>删除规则</h3><ul><li>删除前必须以后端检查为准。</li><li>任一关联计数大于 0 时，后端拒绝删除。</li><li>弹窗展示关联类型、数量、页面路径和筛选提示。</li><li>检查与删除需要防 TOCTOU，审计上线后记录尝试和拦截原因。</li></ul>`}
function render(){renderNav();active==='spec'?renderSpec():renderProductTable();renderDoc()}render();
</script>
</body>
</html>
